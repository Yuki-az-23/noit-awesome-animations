<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Bandit Scroll Leaderboard
    Inspired by "Bandit Scroll Leaderboard"
    A leaderboard/table where rows animate in with stagger, scores count up,
    and scroll position within the table causes items to shift.
    Competitive/gamified feel. Pure CSS + Vanilla JS. No external dependencies.
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bandit Scroll Leaderboard</title>
  <style>
    :root {
      --color-bg: #0f0f1a;
      --color-surface: #16213e;
      --color-primary: #e94560;
      --color-text: #eaeaea;
      --color-gold: #ffd700;
      --color-silver: #c0c0c0;
      --color-bronze: #cd7f32;
      --color-green: #4ecca3;
      --color-blue: #3a86ff;
      --color-cyan: #00d4ff;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Animated background ── */
    .bg-effects {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background: 
        radial-gradient(ellipse at 20% 20%, rgba(233, 69, 96, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 80%, rgba(0, 212, 255, 0.06) 0%, transparent 50%);
    }

    .bg-grid {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      z-index: -1;
      background-image: 
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      animation: grid-drift 20s linear infinite;
    }

    @keyframes grid-drift {
      0% { background-position: 0 0; }
      100% { background-position: 40px 40px; }
    }

    /* ── Header ── */
    .header {
      text-align: center;
      padding: 3rem 2rem 1.5rem;
      position: relative;
    }

    .header-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 1.2rem;
      background: rgba(233, 69, 96, 0.1);
      border: 1px solid rgba(233, 69, 96, 0.3);
      border-radius: 999px;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--color-primary);
      margin-bottom: 1rem;
    }

    .header-badge .live-dot {
      width: 6px;
      height: 6px;
      background: var(--color-primary);
      border-radius: 50%;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(233, 69, 96, 0.4); }
      50% { opacity: 0.6; box-shadow: 0 0 0 8px rgba(233, 69, 96, 0); }
    }

    .header h1 {
      font-size: clamp(2rem, 5vw, 3.5rem);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      background: linear-gradient(135deg, var(--color-primary), var(--color-gold));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header-sub {
      color: #5a6a80;
      font-size: 0.85rem;
      margin-top: 0.5rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    /* ── Podium ── */
    .podium {
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 1rem;
      padding: 2rem;
      max-width: 800px;
      margin: 0 auto 1rem;
    }

    .podium-item {
      flex: 1;
      text-align: center;
      opacity: 0;
      transform: translateY(40px);
      transition: all 0.8s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .podium-item.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .podium-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      margin: 0 auto 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      position: relative;
    }

    .podium-item:nth-child(1) .podium-avatar {
      background: linear-gradient(135deg, #cd7f32, #a0622e);
      box-shadow: 0 0 20px rgba(205, 127, 50, 0.3);
    }

    .podium-item:nth-child(2) .podium-avatar {
      background: linear-gradient(135deg, #ffd700, #daa520);
      box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
      width: 80px;
      height: 80px;
      font-size: 2.2rem;
    }

    .podium-item:nth-child(3) .podium-avatar {
      background: linear-gradient(135deg, #c0c0c0, #a8a8a8);
      box-shadow: 0 0 20px rgba(192, 192, 192, 0.3);
    }

    .podium-rank {
      font-size: 0.65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      margin-top: 0.5rem;
    }

    .podium-item:nth-child(2) .podium-rank { color: var(--color-gold); }
    .podium-item:nth-child(3) .podium-rank { color: var(--color-silver); }
    .podium-item:nth-child(1) .podium-rank { color: var(--color-bronze); }

    .podium-name {
      font-size: 0.9rem;
      font-weight: 600;
      margin-top: 0.3rem;
    }

    .podium-score {
      font-size: 1.2rem;
      font-weight: 800;
      color: var(--color-primary);
      margin-top: 0.2rem;
    }

    .podium-item:nth-child(2) .podium-score { font-size: 1.5rem; }

    .podium-bar {
      margin-top: 0.75rem;
      border-radius: 8px 8px 0 0;
      transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .podium-item:nth-child(1) .podium-bar {
      height: 80px;
      background: linear-gradient(180deg, rgba(205,127,50,0.3), rgba(205,127,50,0.05));
      border: 1px solid rgba(205,127,50,0.2);
      border-bottom: none;
    }

    .podium-item:nth-child(2) .podium-bar {
      height: 120px;
      background: linear-gradient(180deg, rgba(255,215,0,0.3), rgba(255,215,0,0.05));
      border: 1px solid rgba(255,215,0,0.2);
      border-bottom: none;
    }

    .podium-item:nth-child(3) .podium-bar {
      height: 60px;
      background: linear-gradient(180deg, rgba(192,192,192,0.3), rgba(192,192,192,0.05));
      border: 1px solid rgba(192,192,192,0.2);
      border-bottom: none;
    }

    /* ── Stats bar ── */
    .stats-bar {
      display: flex;
      justify-content: center;
      gap: 2rem;
      padding: 1rem 2rem;
      margin-bottom: 1rem;
    }

    .stat-chip {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 1rem;
      background: rgba(22, 33, 62, 0.8);
      border: 1px solid rgba(255,255,255,0.05);
      border-radius: 8px;
      font-size: 0.8rem;
    }

    .stat-chip .stat-val {
      font-weight: 700;
      color: var(--color-primary);
    }

    .stat-chip .stat-lbl {
      color: #5a6a80;
    }

    /* ── Leaderboard Table ── */
    .leaderboard-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 3rem;
    }

    .table-header {
      display: grid;
      grid-template-columns: 60px 1fr 120px 120px 100px;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: #3a4a5e;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .leaderboard-row {
      display: grid;
      grid-template-columns: 60px 1fr 120px 120px 100px;
      gap: 1rem;
      padding: 1rem 1.5rem;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
      transform: translateX(-30px);
      position: relative;
    }

    .leaderboard-row.visible {
      opacity: 1;
      transform: translateX(0);
    }

    .leaderboard-row:hover {
      background: rgba(233, 69, 96, 0.05);
      transform: translateX(4px);
    }

    .leaderboard-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 0;
      background: var(--row-color, var(--color-primary));
      border-radius: 2px;
      transition: height 0.3s;
    }

    .leaderboard-row:hover::before {
      height: 60%;
    }

    .row-rank {
      font-weight: 800;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
    }

    .row-rank.top-1 { color: var(--color-gold); }
    .row-rank.top-2 { color: var(--color-silver); }
    .row-rank.top-3 { color: var(--color-bronze); }

    .row-player {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .player-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--color-surface);
      border: 2px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    .player-info .player-name {
      font-weight: 600;
      font-size: 0.95rem;
    }

    .player-info .player-tag {
      font-size: 0.7rem;
      color: #4a5568;
    }

    .row-score {
      font-weight: 800;
      font-size: 1.1rem;
      font-variant-numeric: tabular-nums;
      color: var(--color-primary);
    }

    .row-streak {
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }

    .streak-bar {
      width: 4px;
      height: 16px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      transition: all 0.5s;
    }

    .streak-bar.active {
      background: var(--color-green);
      animation: streak-pulse 1.5s ease-in-out infinite;
    }

    @keyframes streak-pulse {
      0%, 100% { opacity: 0.6; }
      50% { opacity: 1; }
    }

    .row-change {
      font-size: 0.8rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .row-change.up { color: var(--color-green); }
    .row-change.down { color: var(--color-primary); }
    .row-change.same { color: #4a5568; }

    /* ── Floating particles ── */
    .particle {
      position: fixed;
      width: 4px;
      height: 4px;
      background: var(--color-primary);
      border-radius: 50%;
      opacity: 0;
      pointer-events: none;
      z-index: -1;
    }

    /* ── Footer ── */
    .footer {
      text-align: center;
      padding: 3rem 2rem;
      color: #3a4a5e;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .table-header,
      .leaderboard-row {
        grid-template-columns: 40px 1fr 80px 60px;
      }
      .row-streak { display: none; }
      .header h1 { font-size: 1.8rem; }
      .podium { gap: 0.5rem; }
      .stats-bar { flex-wrap: wrap; gap: 0.5rem; }
    }
  </style>
</head>
<body>

  <div class="bg-effects"></div>
  <div class="bg-grid"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-badge">
      <span class="live-dot"></span>
      Live Rankings
    </div>
    <h1>Leaderboard</h1>
    <p class="header-sub">Season 7 — Week 12</p>
  </header>

  <!-- Podium -->
  <div class="podium">
    <div class="podium-item" data-anim data-delay="400">
      <div class="podium-avatar">🥉</div>
      <div class="podium-rank">3rd</div>
      <div class="podium-name">CryptoKnight</div>
      <div class="podium-score" data-count="47280">0</div>
      <div class="podium-bar"></div>
    </div>
    <div class="podium-item" data-anim data-delay="0">
      <div class="podium-avatar">🥇</div>
      <div class="podium-rank">1st</div>
      <div class="podium-name">ShadowBlade</div>
      <div class="podium-score" data-count="52410">0</div>
      <div class="podium-bar"></div>
    </div>
    <div class="podium-item" data-anim data-delay="200">
      <div class="podium-avatar">🥈</div>
      <div class="podium-rank">2nd</div>
      <div class="podium-name">NeonViper</div>
      <div class="podium-score" data-count="49850">0</div>
      <div class="podium-bar"></div>
    </div>
  </div>

  <!-- Stats -->
  <div class="stats-bar">
    <div class="stat-chip">
      <span class="stat-val" data-count="1247">0</span>
      <span class="stat-lbl">Players</span>
    </div>
    <div class="stat-chip">
      <span class="stat-val" data-count="84532">0</span>
      <span class="stat-lbl">Matches</span>
    </div>
    <div class="stat-chip">
      <span class="stat-val" data-count="3200000">0</span>
      <span class="stat-lbl">XP Earned</span>
    </div>
  </div>

  <!-- Leaderboard Table -->
  <div class="leaderboard-container">
    <div class="table-header">
      <div>Rank</div>
      <div>Player</div>
      <div>Score</div>
      <div>Streak</div>
      <div>Change</div>
    </div>

    <div id="leaderboard"></div>
  </div>

  <footer class="footer">
    BANDIT SCROLL LEADERBOARD — SEASON 7
  </footer>

  <script>
    // ── Leaderboard Data ──
    const players = [
      { rank: 1, name: 'ShadowBlade', tag: '#SHD1', avatar: '⚔️', score: 52410, streak: 12, change: 'up', changeVal: 2, color: '#ffd700' },
      { rank: 2, name: 'NeonViper', tag: '#NV88', avatar: '🐍', score: 49850, streak: 8, change: 'same', changeVal: 0, color: '#c0c0c0' },
      { rank: 3, name: 'CryptoKnight', tag: '#CRK3', avatar: '🛡️', score: 47280, streak: 6, change: 'up', changeVal: 1, color: '#cd7f32' },
      { rank: 4, name: 'PixelStorm', tag: '#PXS4', avatar: '⚡', score: 44650, streak: 4, change: 'down', changeVal: 2, color: '#e94560' },
      { rank: 5, name: 'GhostRunner', tag: '#GHR5', avatar: '👻', score: 41890, streak: 5, change: 'up', changeVal: 3, color: '#4ecca3' },
      { rank: 6, name: 'IronFang', tag: '#IRF6', avatar: '🦷', score: 39240, streak: 3, change: 'down', changeVal: 1, color: '#3a86ff' },
      { rank: 7, name: 'BlazePhoenix', tag: '#BLZ7', avatar: '🔥', score: 37800, streak: 7, change: 'up', changeVal: 2, color: '#ff6b35' },
      { rank: 8, name: 'AquaSerpent', tag: '#AQS8', avatar: '🌊', score: 35200, streak: 2, change: 'same', changeVal: 0, color: '#00d4ff' },
      { rank: 9, name: 'ThunderWolf', tag: '#THW9', avatar: '🐺', score: 33450, streak: 4, change: 'down', changeVal: 3, color: '#b829dd' },
      { rank: 10, name: 'CrimsonEdge', tag: '#CRM10', avatar: '🗡️', score: 31800, streak: 1, change: 'up', changeVal: 5, color: '#e94560' },
      { rank: 11, name: 'FrostByte', tag: '#FRB11', avatar: '❄️', score: 29540, streak: 3, change: 'down', changeVal: 2, color: '#00b4d8' },
      { rank: 12, name: 'SolarFlare', tag: '#SLF12', avatar: '☀️', score: 27800, streak: 6, change: 'up', changeVal: 1, color: '#ffe600' },
      { rank: 13, name: 'VoidWalker', tag: '#VDW13', avatar: '🕳️', score: 25620, streak: 2, change: 'same', changeVal: 0, color: '#6c5ce7' },
      { rank: 14, name: 'SteelVortex', tag: '#STV14', avatar: '🌀', score: 23400, streak: 0, change: 'down', changeVal: 4, color: '#8892b0' },
      { rank: 15, name: 'EmberStrike', tag: '#EMB15', avatar: '💎', score: 21500, streak: 5, change: 'up', changeVal: 2, color: '#ff2d95' },
    ];

    // ── Render Leaderboard ──
    const leaderboard = document.getElementById('leaderboard');

    players.forEach((player, index) => {
      const row = document.createElement('div');
      row.className = 'leaderboard-row';
      row.dataset.anim = '';
      row.dataset.delay = String(150 + index * 80);
      row.style.setProperty('--row-color', player.color);

      const rankClass = player.rank <= 3 ? ` top-${player.rank}` : '';
      const changeIcon = player.change === 'up' ? '↑' : player.change === 'down' ? '↓' : '→';
      const changeClass = player.change;
      const changeText = player.changeVal > 0 ? `${player.changeVal}` : player.changeVal < 0 ? `${Math.abs(player.changeVal)}` : '—';

      // Build streak bars
      let streakBars = '';
      for (let i = 0; i < 12; i++) {
        streakBars += `<div class="streak-bar${i < player.streak ? ' active' : ''}" style="height:${8 + Math.random() * 12}px"></div>`;
      }

      row.innerHTML = `
        <div class="row-rank${rankClass}">${player.rank <= 3 ? ['🥇','🥈','🥉'][player.rank-1] : '#' + player.rank}</div>
        <div class="row-player">
          <div class="player-avatar">${player.avatar}</div>
          <div class="player-info">
            <div class="player-name">${player.name}</div>
            <div class="player-tag">${player.tag}</div>
          </div>
        </div>
        <div class="row-score" data-count="${player.score}">0</div>
        <div class="row-streak">${streakBars}</div>
        <div class="row-change ${changeClass}">${changeIcon} ${changeText}</div>
      `;

      leaderboard.appendChild(row);
    });

    // ── Intersection Observer for row animations ──
    const animObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const el = entry.target;
          const delay = parseInt(el.dataset.delay || '0', 10);
          setTimeout(() => {
            el.classList.add('visible');
          }, delay);
          animObserver.unobserve(el);
        }
      });
    }, { rootMargin: '0px 0px -50px 0px', threshold: 0.1 });

    document.querySelectorAll('[data-anim]').forEach(el => {
      animObserver.observe(el);
    });

    // ── Podium animations ──
    const podiumItems = document.querySelectorAll('.podium-item');
    const podiumObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const delay = parseInt(entry.target.dataset.delay || '0', 10);
          setTimeout(() => {
            entry.target.classList.add('visible');
          }, delay);
          podiumObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.3 });

    podiumItems.forEach(item => podiumObserver.observe(item));

    // ── Counter animation ──
    function animateCounter(element, target, duration = 1500) {
      const start = performance.now();
      function update(now) {
        const elapsed = now - start;
        const progress = Math.min(elapsed / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);
        const current = Math.round(eased * target);
        element.textContent = current.toLocaleString();
        if (progress < 1) requestAnimationFrame(update);
      }
      requestAnimationFrame(update);
    }

    // ── Observe score counters ──
    const counterObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting) {
          const target = parseInt(entry.target.dataset.count, 10);
          animateCounter(entry.target, target);
          counterObserver.unobserve(entry.target);
        }
      });
    }, { threshold: 0.5 });

    document.querySelectorAll('[data-count]').forEach(el => {
      const text = el.textContent;
      counterObserver.observe(el);
    });

    // ── Scroll-based row shift ──
    const leaderboardContainer = document.querySelector('.leaderboard-container');

    window.addEventListener('scroll', () => {
      const rows = document.querySelectorAll('.leaderboard-row');
      const containerRect = leaderboardContainer.getBoundingClientRect();
      const viewCenter = window.innerHeight / 2;

      rows.forEach(row => {
        const rowRect = row.getBoundingClientRect();
        const rowCenter = rowRect.top + rowRect.height / 2;
        const distance = Math.abs(viewCenter - rowCenter);
        const maxDistance = window.innerHeight;

        // Slight parallax shift based on distance from center
        const intensity = Math.max(0, 1 - distance / maxDistance);
        const shift = intensity * 4;
        const scale = 1 + intensity * 0.01;

        if (row.matches(':hover')) return;
        row.style.transform = `translateX(${shift}px) scale(${scale})`;
      });
    }, { passive: true });

    // ── Floating particles ──
    function createParticles() {
      for (let i = 0; i < 15; i++) {
        const particle = document.createElement('div');
        particle.className = 'particle';
        particle.style.left = Math.random() * 100 + '%';
        particle.style.top = Math.random() * 100 + '%';
        particle.style.width = (2 + Math.random() * 4) + 'px';
        particle.style.height = particle.style.width;
        particle.style.background = ['#e94560', '#ffd700', '#00d4ff', '#4ecca3', '#b829dd'][Math.floor(Math.random() * 5)];
        particle.style.animation = `float-particle ${5 + Math.random() * 10}s ease-in-out infinite`;
        particle.style.animationDelay = Math.random() * 5 + 's';
        particle.style.opacity = 0.1 + Math.random() * 0.2;
        document.body.appendChild(particle);
      }
    }

    // Add particle keyframes
    const style = document.createElement('style');
    style.textContent = `
      @keyframes float-particle {
        0%, 100% { transform: translate(0, 0); }
        25% { transform: translate(${30 + Math.random() * 40}px, ${-20 - Math.random() * 40}px); }
        50% { transform: translate(${-20 - Math.random() * 30}px, ${-40 - Math.random() * 60}px); }
        75% { transform: translate(${10 + Math.random() * 20}px, ${-10 - Math.random() * 30}px); }
      }
    `;
    document.head.appendChild(style);
    createParticles();
  </script>
</body>
</html>
