<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Animated Quiz Ladybug
  Inspired by "Animated Quiz Lady Bird" & gamified podcast microsites
  Playful gamified quiz with cute character, animated progress path,
  scored answers, celebration animations, and confetti on completion.
  Pure CSS + Vanilla JS · No dependencies
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Quiz – Ladybug</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#16213e;--primary:#e94560;--accent:#ff6b8a;
  --accent2:#ffc947;--text:#eaeaea;--muted:#7a7a9a;--success:#2ecc71;
  --card:#1a1a2e;--border:rgba(233,69,96,.25);--radius:16px;
}
html,body{height:100%;font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

/* ── animated background ── */
.bg-layer{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
.bg-blob{position:absolute;border-radius:50%;filter:blur(120px);opacity:.18;animation:blobFloat 12s ease-in-out infinite}
.bg-blob:nth-child(1){width:500px;height:500px;background:var(--primary);top:-10%;left:-10%;animation-delay:0s}
.bg-blob:nth-child(2){width:400px;height:400px;background:var(--accent2);bottom:-10%;right:-10%;animation-delay:-4s}
.bg-blob:nth-child(3){width:350px;height:350px;background:#6c5ce7;top:40%;left:50%;animation-delay:-8s}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.1)}66%{transform:translate(-30px,20px) scale(.9)}}

/* ── floating leaves ── */
.leaf{position:absolute;font-size:1.6rem;opacity:.25;animation:leafFall linear infinite;pointer-events:none}
@keyframes leafFall{0%{transform:translateY(-30px) rotate(0deg)}100%{transform:translateY(105vh) rotate(360deg)}}

/* ── layout ── */
.container{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:30px 20px;min-height:100vh;display:flex;flex-direction:column;align-items:center}

/* ── header ── */
.quiz-header{text-align:center;margin-bottom:28px}
.quiz-title{font-size:2.2rem;font-weight:800;background:linear-gradient(135deg,var(--primary),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.quiz-subtitle{color:var(--muted);margin-top:6px;font-size:.95rem}

/* ── ladybug character ── */
.ladybug{width:52px;height:52px;position:relative;margin:0 auto 20px;animation:ladybugBounce 2s ease-in-out infinite}
@keyframes ladybugBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.ladybug-body{width:44px;height:38px;background:#e94560;border-radius:50%;position:absolute;bottom:0;left:4px;border:2px solid #c0392b}
.ladybug-head{width:20px;height:18px;background:#1a1a2e;border-radius:50%;position:absolute;top:0;left:16px;z-index:1}
.ladybug-eye{width:6px;height:6px;background:#fff;border-radius:50%;position:absolute;top:4px}
.ladybug-eye.left{left:3px}.ladybug-eye.right{right:3px}
.ladybug-pupil{width:3px;height:3px;background:#1a1a2e;border-radius:50%;position:absolute;top:1px;left:1px}
.ladybug-line{position:absolute;left:50%;top:8px;width:2px;height:30px;background:#1a1a2e;transform:translateX(-50%)}
.ladybug-spot{width:8px;height:8px;background:#1a1a2e;border-radius:50%;position:absolute}
.ladybug-spot.s1{top:12px;left:4px}.ladybug-spot.s2{top:12px;right:4px}
.ladybug-spot.s3{top:24px;left:8px}.ladybug-spot.s4{top:24px;right:8px}
.ladybug-antenna{position:absolute;width:16px;height:12px;border:2px solid #1a1a2e;border-bottom:none;border-radius:50% 50% 0 0;top:-6px}
.ladybug-antenna.left{left:0;transform:rotate(-20deg)}.ladybug-antenna.right{right:0;transform:rotate(20deg)}

/* ── progress bar ── */
.progress-section{width:100%;margin-bottom:30px}
.progress-label{display:flex;justify-content:space-between;font-size:.85rem;color:var(--muted);margin-bottom:8px}
.progress-label span:last-child{color:var(--accent2);font-weight:700}
.progress-track{width:100%;height:10px;background:var(--card);border-radius:10px;position:relative;overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--accent2));border-radius:10px;transition:width .6s cubic-bezier(.34,1.56,.64,1);position:relative}
.progress-ladybug{position:absolute;top:50%;transform:translate(-50%,-50%);transition:left .6s cubic-bezier(.34,1.56,.64,1);z-index:2;font-size:1.3rem;filter:drop-shadow(0 2px 6px rgba(0,0,0,.4))}

/* ── question card ── */
.question-card{width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:32px;transition:transform .3s,opacity .3s;opacity:1}
.question-card.slide-out{transform:translateX(-120%);opacity:0}
.question-card.slide-in{transform:translateX(120%);opacity:0}
.question-card.active{transform:translateX(0);opacity:1}
.question-number{font-size:.8rem;color:var(--accent2);font-weight:700;text-transform:uppercase;letter-spacing:2px;margin-bottom:10px}
.question-text{font-size:1.35rem;font-weight:700;line-height:1.5;margin-bottom:24px}

/* ── answers ── */
.answers-grid{display:flex;flex-direction:column;gap:12px}
.answer-btn{background:var(--surface);border:2px solid var(--border);border-radius:12px;padding:16px 20px;color:var(--text);font-size:1rem;cursor:pointer;transition:all .3s;text-align:left;display:flex;align-items:center;gap:14px;position:relative;overflow:hidden}
.answer-btn::before{content:'';position:absolute;left:0;top:0;height:100%;width:4px;background:var(--primary);transform:scaleY(0);transition:transform .3s;border-radius:0 4px 4px 0}
.answer-btn:hover{border-color:var(--primary);transform:translateX(4px);background:rgba(233,69,96,.08)}
.answer-btn:hover::before{transform:scaleY(1)}
.answer-letter{width:32px;height:32px;border-radius:50%;background:rgba(233,69,96,.15);color:var(--primary);font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:.85rem;transition:all .3s}
.answer-btn:hover .answer-letter{background:var(--primary);color:#fff}
.answer-btn.correct{border-color:var(--success);background:rgba(46,204,113,.12)}
.answer-btn.correct .answer-letter{background:var(--success);color:#fff}
.answer-btn.wrong{border-color:#e74c3c;background:rgba(231,76,60,.1)}
.answer-btn.wrong .answer-letter{background:#e74c3c;color:#fff}
.answer-btn.disabled{pointer-events:none}

/* ── celebration ── */
.celebration{position:fixed;inset:0;z-index:100;pointer-events:none;display:none}
.celebration.active{display:block}
.confetti-piece{position:absolute;width:10px;height:10px;border-radius:2px;animation:confettiFall linear forwards}
@keyframes confettiFall{0%{transform:translateY(-20px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* ── score popup ── */
.score-popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%) scale(0);background:var(--card);border:2px solid var(--accent2);border-radius:20px;padding:40px;text-align:center;z-index:90;transition:transform .4s cubic-bezier(.34,1.56,.64,1);min-width:320px}
.score-popup.visible{transform:translate(-50%,-50%) scale(1)}
.score-emoji{font-size:3.5rem;margin-bottom:12px;animation:emojiPop .5s ease}
@keyframes emojiPop{0%{transform:scale(0)}60%{transform:scale(1.3)}100%{transform:scale(1)}}
.score-value{font-size:3rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.score-label{font-size:.9rem;color:var(--muted);margin-top:4px}
.restart-btn{margin-top:24px;background:linear-gradient(135deg,var(--primary),var(--accent2));color:#fff;border:none;padding:14px 36px;border-radius:50px;font-size:1rem;font-weight:700;cursor:pointer;transition:transform .2s,box-shadow .2s}
.restart-btn:hover{transform:scale(1.05);box-shadow:0 8px 30px rgba(233,69,96,.4)}

/* ── +1 float ── */
.plus-one{position:fixed;font-size:1.5rem;font-weight:900;color:var(--accent2);pointer-events:none;animation:floatUp 1s ease forwards;z-index:80}
@keyframes floatUp{0%{transform:translateY(0) scale(1);opacity:1}100%{transform:translateY(-80px) scale(1.5);opacity:0}}

/* ── shake ── */
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}}
.shake{animation:shake .5s ease}

/* ── responsive ── */
@media(max-width:500px){
  .quiz-title{font-size:1.6rem}
  .question-text{font-size:1.15rem}
  .question-card{padding:20px}
}
</style>
</head>
<body>

<div class="bg-layer">
  <div class="bg-blob"></div><div class="bg-blob"></div><div class="bg-blob"></div>
</div>

<div class="container">
  <!-- Ladybug Character -->
  <div class="ladybug">
    <div class="ladybug-antenna left"></div>
    <div class="ladybug-antenna right"></div>
    <div class="ladybug-head">
      <div class="ladybug-eye left"><div class="ladybug-pupil"></div></div>
      <div class="ladybug-eye right"><div class="ladybug-pupil"></div></div>
    </div>
    <div class="ladybug-body">
      <div class="ladybug-line"></div>
      <div class="ladybug-spot s1"></div>
      <div class="ladybug-spot s2"></div>
      <div class="ladybug-spot s3"></div>
      <div class="ladybug-spot s4"></div>
    </div>
  </div>

  <div class="quiz-header">
    <h1 class="quiz-title">Bug Knowledge Quiz</h1>
    <p class="quiz-subtitle">Test your insect IQ — 8 tiny questions!</p>
  </div>

  <!-- Progress -->
  <div class="progress-section">
    <div class="progress-label">
      <span>Question <span id="qNum">1</span>/8</span>
      <span id="scoreLabel">Score: 0</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
      <div class="progress-ladybug" id="progressBug" style="left:0%">🐞</div>
    </div>
  </div>

  <!-- Question Card -->
  <div class="question-card" id="questionCard">
    <div class="question-number" id="qLabel">Question 1</div>
    <div class="question-text" id="qText"></div>
    <div class="answers-grid" id="answersGrid"></div>
  </div>
</div>

<!-- Celebration overlay -->
<div class="celebration" id="celebration"></div>

<!-- Score popup -->
<div class="score-popup" id="scorePopup">
  <div class="score-emoji" id="scoreEmoji">🎉</div>
  <div class="score-value" id="finalScore">8/8</div>
  <div class="score-label">Perfect Score!</div>
  <button class="restart-btn" id="restartBtn">Play Again</button>
</div>

<script>
/* ── Quiz Data ── */
const QUIZ = [
  { q:"How many legs does a ladybug have?", answers:["4","6","8","10"], correct:1 },
  { q:"What colour are most ladybug spots?", answers:["White","Black","Red","Yellow"], correct:1 },
  { q:"Ladybugs are actually a type of…", answers:["Butterfly","Beetle","Ant","Fly"], correct:1 },
  { q:"How many spots does a seven-spot ladybug have?", answers:["5","7","9","14"], correct:1 },
  { q:"Ladybugs help gardeners by eating…", answers:["Leaves","Aphids","Seeds","Fruit"], correct:1 },
  { q:"What do ladybugs do when threatened?", answers:["Bite","Fly away","Bleed from knees","Play dead"], correct:2 },
  { q:"A ladybug's bright colour is a warning called…", answers:["Camouflage","Mimicry","Aposematism","Hibernation"], correct:2 },
  { q:"How long can a ladybug live?", answers:["1 month","6 months","1 year","3 years"], correct:2 }
];
const LETTERS = ['A','B','C','D'];

/* ── State ── */
let current=0, score=0, answered=false;

const $=s=>document.getElementById(s);
const progressFill=$('progressFill'), progressBug=$('progressBug');
const qNum=$('qNum'), scoreLabel=$('scoreLabel');
const qLabel=$('qLabel'), qText=$('qText'), answersGrid=$('answersGrid');
const questionCard=$('questionCard');
const celebration=$('celebration'), scorePopup=$('scorePopup');

/* ── Initialise ── */
function init(){
  current=0; score=0; answered=false;
  scorePopup.classList.remove('visible');
  celebration.classList.remove('active');
  celebration.innerHTML='';
  renderQuestion();
}

/* ── Render Question ── */
function renderQuestion(){
  answered=false;
  const data=QUIZ[current];
  qNum.textContent=current+1;
  scoreLabel.textContent='Score: '+score;
  qLabel.textContent='Question '+(current+1);
  qText.textContent=data.q;

  const pct=(current/QUIZ.length)*100;
  progressFill.style.width=pct+'%';
  progressBug.style.left=pct+'%';

  answersGrid.innerHTML='';
  data.answers.forEach((a,i)=>{
    const btn=document.createElement('button');
    btn.className='answer-btn';
    btn.innerHTML=`<span class="answer-letter">${LETTERS[i]}</span><span>${a}</span>`;
    btn.addEventListener('click',()=>pickAnswer(i,btn));
    answersGrid.appendChild(btn);
  });

  questionCard.classList.remove('slide-out','slide-in');
  questionCard.classList.add('active');
}

/* ── Pick Answer ── */
function pickAnswer(idx, btn){
  if(answered) return;
  answered=true;

  const data=QUIZ[current];
  const allBtns=answersGrid.querySelectorAll('.answer-btn');
  allBtns.forEach(b=>b.classList.add('disabled'));

  if(idx===data.correct){
    btn.classList.add('correct');
    score++;
    scoreLabel.textContent='Score: '+score;
    showPlusOne(btn);
  } else {
    btn.classList.add('wrong');
    questionCard.classList.add('shake');
    setTimeout(()=>questionCard.classList.remove('shake'),500);
    allBtns[data.correct].classList.add('correct');
  }

  /* auto advance after delay */
  setTimeout(()=>{
    if(current<QUIZ.length-1){
      questionCard.classList.add('slide-out');
      setTimeout(()=>{
        current++;
        questionCard.classList.remove('slide-out');
        questionCard.classList.add('slide-in');
        setTimeout(()=>{
          questionCard.classList.remove('slide-in');
          renderQuestion();
        },50);
      },300);
    } else {
      /* complete progress bar */
      progressFill.style.width='100%';
      progressBug.style.left='100%';
      finishQuiz();
    }
  },1200);
}

/* ── +1 Float ── */
function showPlusOne(btn){
  const el=document.createElement('div');
  el.className='plus-one';
  el.textContent='+1';
  const rect=btn.getBoundingClientRect();
  el.style.left=rect.right+'px';
  el.style.top=rect.top+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1000);
}

/* ── Confetti ── */
function spawnConfetti(count=80){
  celebration.classList.add('active');
  const colors=['#e94560','#ffc947','#6c5ce7','#2ecc71','#00cec9','#fd79a8','#fdcb6e'];
  for(let i=0;i<count;i++){
    const piece=document.createElement('div');
    piece.className='confetti-piece';
    piece.style.left=Math.random()*100+'%';
    piece.style.background=colors[Math.floor(Math.random()*colors.length)];
    piece.style.width=(6+Math.random()*8)+'px';
    piece.style.height=(6+Math.random()*8)+'px';
    piece.style.animationDuration=(2+Math.random()*2)+'s';
    piece.style.animationDelay=(Math.random()*1.5)+'s';
    piece.style.borderRadius=Math.random()>.5?'50%':'2px';
    celebration.appendChild(piece);
  }
}

/* ── Finish ── */
function finishQuiz(){
  spawnConfetti(120);

  const pct=Math.round(score/QUIZ.length*100);
  let emoji='🎉';
  let label='Perfect Score!';
  if(pct<50){emoji='💪';label='Keep Trying!';}
  else if(pct<75){emoji='👍';label='Good Job!';}
  else if(pct<100){emoji='🌟';label='Almost Perfect!';}

  $('scoreEmoji').textContent=emoji;
  $('finalScore').textContent=score+'/'+QUIZ.length;
  $('scorePopup').querySelector('.score-label').textContent=label;

  setTimeout(()=>scorePopup.classList.add('visible'),600);
}

$('restartBtn').addEventListener('click', init);

/* ── Floating leaves ── */
(function createLeaves(){
  const bg=document.querySelector('.bg-layer');
  const leaves=['🍃','🍂','🌿','🍀'];
  for(let i=0;i<10;i++){
    const l=document.createElement('div');
    l.className='leaf';
    l.textContent=leaves[Math.floor(Math.random()*leaves.length)];
    l.style.left=Math.random()*100+'%';
    l.style.animationDuration=(8+Math.random()*12)+'s';
    l.style.animationDelay=(-Math.random()*12)+'s';
    l.style.fontSize=(1+Math.random())+'rem';
    bg.appendChild(l);
  }
})();

init();
</script>
</body>
</html>
