<!DOCTYPE html>
<html lang="en">
<head>
<!--
  ============================================================
  SVG Morph Slider
  A full-viewport image/content slider where an SVG shape
  morphs between slides as a reveal mask. Inspired by Awwwards
  sites with organic shape transitions.

  Pure CSS + Vanilla JS · No external dependencies
  ============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Morph Slider</title>
<style>
  /* ── Reset & Variables ─────────────────────────── */
  :root {
    --color-bg: #0f0f1a;
    --color-surface: #16213e;
    --color-primary: #e94560;
    --color-text: #eaeaea;
    --font-display: 'Segoe UI', system-ui, -apple-system, sans-serif;
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--font-display);
    background: var(--color-bg);
    color: var(--color-text);
    overflow: hidden;
    width: 100vw;
    height: 100vh;
    cursor: pointer;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Slide Container ───────────────────────────── */
  .slider-container {
    position: relative;
    width: 100vw;
    height: 100vh;
    overflow: hidden;
  }

  .slide {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .slide.active { opacity: 1; }

  .slide-background {
    position: absolute;
    inset: 0;
    background-size: cover;
    background-position: center;
    filter: brightness(0.4);
  }

  .slide-content {
    position: relative;
    z-index: 2;
    text-align: center;
    max-width: 700px;
    padding: 2rem;
  }

  .slide-number {
    font-size: 0.85rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--color-primary);
    margin-bottom: 1rem;
    font-weight: 600;
  }

  .slide-title {
    font-size: clamp(2.5rem, 6vw, 5rem);
    font-weight: 800;
    line-height: 1.05;
    margin-bottom: 1.2rem;
    letter-spacing: -0.02em;
  }

  .slide-subtitle {
    font-size: clamp(1rem, 2vw, 1.25rem);
    font-weight: 300;
    opacity: 0.75;
    line-height: 1.6;
  }

  /* ── Morphing SVG Mask ─────────────────────────── */
  .morph-svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 10;
    pointer-events: none;
  }

  /* ── Navigation ────────────────────────────────── */
  .nav-dots {
    position: fixed;
    bottom: 2.5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    display: flex;
    gap: 1rem;
  }

  .nav-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 2px solid rgba(234,234,234,0.4);
    background: transparent;
    cursor: pointer;
    transition: all 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    position: relative;
  }

  .nav-dot:hover { border-color: var(--color-primary); }

  .nav-dot.active {
    background: var(--color-primary);
    border-color: var(--color-primary);
    transform: scale(1.3);
  }

  .nav-arrows {
    position: fixed;
    top: 50%;
    right: 2rem;
    transform: translateY(-50%);
    z-index: 20;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }

  .nav-arrow {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    border: 2px solid rgba(234,234,234,0.25);
    background: rgba(15,15,26,0.6);
    backdrop-filter: blur(8px);
    color: var(--color-text);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.2rem;
    transition: all 0.3s ease;
  }

  .nav-arrow:hover {
    border-color: var(--color-primary);
    background: rgba(233,69,96,0.15);
  }

  /* ── Progress Bar ──────────────────────────────── */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--color-primary), #ff6b6b);
    z-index: 30;
    transition: width 0.1s linear;
  }

  /* ── Hint ──────────────────────────────────────── */
  .hint {
    position: fixed;
    bottom: 5rem;
    left: 50%;
    transform: translateX(-50%);
    z-index: 20;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    opacity: 0.4;
    animation: hintPulse 2s ease-in-out infinite;
  }

  @keyframes hintPulse {
    0%, 100% { opacity: 0.2; }
    50% { opacity: 0.6; }
  }

  /* ── Ambient Particles ────────────────────────── */
  .particle {
    position: absolute;
    border-radius: 50%;
    background: rgba(233,69,96,0.15);
    pointer-events: none;
    z-index: 1;
  }
</style>
</head>
<body>

<div class="slider-container" id="slider">
  <!-- SVG Mask Overlay -->
  <svg class="morph-svg" id="morphSvg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
    <defs>
      <mask id="revealMask">
        <rect width="1920" height="1080" fill="white"/>
        <path id="morphPath" d="" fill="black"/>
      </mask>
      <filter id="morphBlur">
        <feGaussianBlur in="SourceGraphic" stdDeviation="3"/>
      </filter>
    </defs>
    <rect width="1920" height="1080" fill="var(--color-bg)" mask="url(#revealMask)"/>
  </svg>

  <!-- Progress Bar -->
  <div class="progress-bar" id="progressBar" style="width:25%"></div>
</div>

<!-- Navigation -->
<div class="nav-dots" id="navDots"></div>
<div class="nav-arrows">
  <button class="nav-arrow" id="prevBtn" aria-label="Previous slide">↑</button>
  <button class="nav-arrow" id="nextBtn" aria-label="Next slide">↓</button>
</div>
<div class="hint">Click arrows or use keyboard to navigate</div>

<script>
/* ================================================================
   SVG Morph Slider – Core Logic
   Smooth path interpolation between organic SVG shapes
   serving as reveal masks between slides.
   ================================================================ */

// ── Slide Data ──────────────────────────────────
const slidesData = [
  {
    gradient: 'linear-gradient(135deg, #1a1a2e 0%, #16213e 40%, #0f3460 100%)',
    number: '01 — Introduction',
    title: 'Shape Your\nExperience',
    subtitle: 'Where organic forms meet digital precision. Every transition breathes life into the interface.'
  },
  {
    gradient: 'linear-gradient(135deg, #2d1b69 0%, #11998e 100%)',
    number: '02 — Exploration',
    title: 'Morphing\nBetween States',
    subtitle: 'Seamless transitions that guide the eye through narrative flow.'
  },
  {
    gradient: 'linear-gradient(135deg, #0f3460 0%, #e94560 100%)',
    number: '03 — Discovery',
    title: 'Organic\nReveals',
    subtitle: 'Nature-inspired geometry creates fluid, breathing interfaces.'
  },
  {
    gradient: 'linear-gradient(135deg, #533483 0%, #e94560 50%, #f38181 100%)',
    number: '04 — Resolution',
    title: 'Every Pixel\nIn Motion',
    subtitle: 'Precision animation meets creative expression in every frame.'
  }
];

// ── SVG Path Definitions (4 keyframe shapes) ───
// Each set has an "entrance" and "exit" path for morphing
const morphPaths = {
  // Circle-like blob
  circle: 'M960,540 C960,540 1200,300 1200,540 C1200,780 960,540 960,540 C960,540 720,780 720,540 C720,300 960,540 960,540 Z',
  // Diamond
  diamond: 'M960,240 C1100,390 1400,540 1200,780 C1000,1020 960,840 720,780 C480,720 820,390 960,240 Z',
  // Amoeba
  amoeba: 'M600,400 C700,200 1100,180 1300,350 C1500,520 1400,800 1200,900 C1000,1000 600,900 450,700 C300,500 500,600 600,400 Z',
  // Star burst
  star: 'M960,180 C1020,420 1200,380 1300,500 C1380,600 1200,700 1100,800 C1000,900 960,960 900,800 C840,640 700,600 650,480 C600,360 900,200 960,180 Z',
  // Full cover
  reveal: 'M0,0 L1920,0 L1920,1080 L0,1080 Z',
  // Hidden
  hidden: 'M960,540 L960,540 L960,540 L960,540 Z'
};

// ── State ───────────────────────────────────────
let currentSlide = 0;
let isAnimating = false;
let animationProgress = 0;

// ── Path Interpolation ──────────────────────────
// Parse SVG path into array of [command, ...numbers]
function parsePath(d) {
  const commands = [];
  const regex = /([A-Za-z])\s*([^A-Za-z]*)/g;
  let match;
  while ((match = regex.exec(d)) !== null) {
    const cmd = match[1];
    const nums = match[2].trim();
    const values = nums ? nums.split(/[\s,]+/).map(Number) : [];
    commands.push([cmd, ...values]);
  }
  return commands;
}

// Serialize parsed path back to d string
function serializePath(parsed) {
  return parsed.map(cmd => {
    const letter = cmd[0];
    const nums = cmd.slice(1);
    return letter + nums.join(',');
  }).join(' ');
}

// Cubic bezier approximation for smooth morph curves
function cubicBezier(t, p0, p1, p2, p3) {
  const mt = 1 - t;
  return mt * mt * mt * p0 + 3 * mt * mt * t * p1 + 3 * mt * t * t * p2 + t * t * t * p3;
}

// Smooth easing
function easeInOutCubic(t) {
  return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2;
}

function easeOutQuart(t) {
  return 1 - Math.pow(1 - t, 4);
}

// Interpolate between two parsed paths
function interpolatePaths(parsedFrom, parsedTo, t) {
  const result = [];
  const len = Math.min(parsedFrom.length, parsedTo.length);

  for (let i = 0; i < len; i++) {
    const fromCmd = parsedFrom[i];
    const toCmd = parsedTo[i];

    if (fromCmd.length !== toCmd.length) {
      result.push(t < 0.5 ? [...fromCmd] : [...toCmd]);
      continue;
    }

    const interpCmd = [fromCmd[0] || toCmd[0]];
    for (let j = 1; j < fromCmd.length; j++) {
      interpCmd.push(fromCmd[j] + (toCmd[j] - fromCmd[j]) * t);
    }
    result.push(interpCmd);
  }
  return result;
}

// ── Generate Smooth Morphing Paths ───────────────
// Create properly structured paths with same number of points
function generateMorphPaths() {
  const w = 1920, h = 1080;
  const cx = w / 2, cy = h / 2;

  return {
    // Blob shape – organic circle
    blob: `M${cx},${cy-400} C${cx+280},${cy-400} ${cx+450},${cy-200} ${cx+450},${cy} C${cx+450},${cy+200} ${cx+200},${cy+420} ${cx},${cy+400} C${cx-250},${cy+380} ${cx-450},${cy+180} ${cx-450},${cy} C${cx-450},${cy-220} ${cx-260},${cy-400} ${cx},${cy-400} Z`,

    // Angular organic form
    angular: `M${cx-200},${cy-380} C${cx+50},${cy-450} ${cx+350},${cy-350} ${cx+420},${cy-100} C${cx+480},${cy+150} ${cx+380},${cy+350} ${cx+100},${cy+400} C${cx-180},${cy+440} ${cx-400},${cy+300} ${cx-450},${cy+50} C${cx-490},${cy-180} ${cx-350},${cy-360} ${cx-200},${cy-380} Z`,

    // Wide horizontal sweep
    sweep: `M${cx-600},${cy-200} C${cx-300},${cy-380} ${cx+200},${cy-400} ${cx+600},${cy-250} C${cx+750},${cy-180} ${cx+700},${cy+200} ${cx+500},${cy+300} C${cx+200},${cy+430} ${cx-250},${cy+380} ${cx-550},${cy+250} C${cx-700},${cy+180} ${cx-700},${cy-100} ${cx-600},${cy-200} Z`,

    // Full screen reveal
    reveal: `M0,0 C0,0 ${w},0 ${w},0 C${w},0 ${w},${h} ${w},${h} C${w},${h} 0,${h} 0,${h} C0,${h} 0,0 0,0 Z`,

    // Hidden (tiny point)
    hidden: `M${cx},${cy} C${cx},${cy} ${cx},${cy} ${cx},${cy} C${cx},${cy} ${cx},${cy} ${cx},${cy} C${cx},${cy} ${cx},${cy} ${cx},${cy} Z`
  };
}

const paths = generateMorphPaths();

// ── Build Slides ────────────────────────────────
const sliderEl = document.getElementById('slider');
const navDotsEl = document.getElementById('navDots');

slidesData.forEach((data, i) => {
  // Create slide element
  const slide = document.createElement('div');
  slide.className = `slide${i === 0 ? ' active' : ''}`;
  slide.dataset.index = i;

  slide.innerHTML = `
    <div class="slide-background" style="background:${data.gradient}"></div>
    <div class="slide-content">
      <div class="slide-number">${data.number}</div>
      <h1 class="slide-title">${data.title.replace('\n', '<br>')}</h1>
      <p class="slide-subtitle">${data.subtitle}</p>
    </div>
  `;
  // Insert before SVG mask
  sliderEl.insertBefore(slide, document.getElementById('morphSvg'));

  // Create nav dot
  const dot = document.createElement('button');
  dot.className = `nav-dot${i === 0 ? ' active' : ''}`;
  dot.dataset.index = i;
  dot.addEventListener('click', () => goToSlide(i));
  navDotsEl.appendChild(dot);
});

// ── Ambient Particles ───────────────────────────
for (let i = 0; i < 20; i++) {
  const p = document.createElement('div');
  p.className = 'particle';
  const size = Math.random() * 6 + 2;
  p.style.cssText = `
    width:${size}px; height:${size}px;
    left:${Math.random()*100}%; top:${Math.random()*100}%;
    animation: float${i%3} ${8+Math.random()*12}s ease-in-out infinite;
    animation-delay: ${-Math.random()*10}s;
  `;
  sliderEl.appendChild(p);
}

// Add float animations
const styleSheet = document.createElement('style');
styleSheet.textContent = `
  @keyframes float0 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(30px, -40px) scale(1.2); }
    66% { transform: translate(-20px, 20px) scale(0.8); }
  }
  @keyframes float1 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(-40px, 30px) scale(0.9); }
    66% { transform: translate(25px, -35px) scale(1.1); }
  }
  @keyframes float2 {
    0%, 100% { transform: translate(0, 0) scale(1); }
    33% { transform: translate(20px, 40px) scale(1.15); }
    66% { transform: translate(-30px, -20px) scale(0.85); }
  }
`;
document.head.appendChild(styleSheet);

// ── Animation Engine ────────────────────────────
const morphPathEl = document.getElementById('morphPath');
const progressBar = document.getElementById('progressBar');

// The path transition sequence for each slide change
const transitionPaths = [
  paths.blob,    // Slide 0→1: blob morph
  paths.angular, // Slide 1→2: angular morph
  paths.sweep,   // Slide 2→3: sweeping form
  paths.blob     // Slide 3→0: back to blob
];

function goToSlide(targetIndex) {
  if (isAnimating || targetIndex === currentSlide) return;

  const direction = targetIndex > currentSlide ? 1 : -1;
  const fromSlide = currentSlide;
  const toSlide = targetIndex;
  const transIndex = Math.min(fromSlide, slidesData.length - 1);

  isAnimating = true;

  // Update slide visuals
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.nav-dot');

  // Set target slide visible
  slides[toSlide].style.opacity = '1';
  slides[toSlide].style.zIndex = '1';
  slides[fromSlide].style.zIndex = '3';

  // Parse the morph shape keyframes
  const pathFrom = parsePath(paths.hidden);
  const pathShape = parsePath(transitionPaths[transIndex % transitionPaths.length]);
  const pathTo = parsePath(paths.reveal);

  const duration = 1200;
  const startTime = performance.now();

  // Phase 1: current → morph shape (0 → 0.5)
  // Phase 2: morph shape → full reveal (0.5 → 1.0)
  function animate(now) {
    const elapsed = now - startTime;
    let t = Math.min(elapsed / duration, 1);

    let morphT;
    let parsedResult;

    if (t < 0.5) {
      // Phase 1: expand from hidden to morph shape
      const phaseT = easeInOutCubic(t * 2); // 0→1 in first half
      parsedResult = interpolatePaths(pathFrom, pathShape, phaseT);
    } else {
      // Phase 2: expand from morph shape to reveal
      const phaseT = easeOutQuart((t - 0.5) * 2); // 0→1 in second half
      parsedResult = interpolatePaths(pathShape, pathTo, phaseT);
    }

    morphPathEl.setAttribute('d', serializePath(parsedResult));

    // Update progress bar
    const totalProgress = ((toSlide) + t) / slidesData.length * 100;
    progressBar.style.width = totalProgress + '%';

    if (t < 1) {
      requestAnimationFrame(animate);
    } else {
      // Animation complete
      slides[fromSlide].style.opacity = '0';
      slides[fromSlide].style.zIndex = '0';
      slides[fromSlide].classList.remove('active');
      slides[toSlide].classList.add('active');
      slides[toSlide].style.zIndex = '2';

      // Hide mask
      morphPathEl.setAttribute('d', paths.hidden);

      dots[fromSlide].classList.remove('active');
      dots[toSlide].classList.add('active');

      currentSlide = toSlide;
      isAnimating = false;
    }
  }

  // Start with hidden mask, then animate
  morphPathEl.setAttribute('d', paths.hidden);

  // Slight delay to ensure renders
  requestAnimationFrame(() => {
    requestAnimationFrame(animate);
  });
}

function nextSlide() {
  const next = (currentSlide + 1) % slidesData.length;
  goToSlide(next);
}

function prevSlide() {
  const prev = (currentSlide - 1 + slidesData.length) % slidesData.length;
  goToSlide(prev);
}

// ── Event Listeners ─────────────────────────────
document.getElementById('nextBtn').addEventListener('click', nextSlide);
document.getElementById('prevBtn').addEventListener('click', prevSlide);

document.addEventListener('keydown', (e) => {
  if (e.key === 'ArrowDown' || e.key === 'ArrowRight' || e.key === ' ') {
    e.preventDefault();
    nextSlide();
  } else if (e.key === 'ArrowUp' || e.key === 'ArrowLeft') {
    e.preventDefault();
    prevSlide();
  }
});

// Auto-advance every 6 seconds
let autoTimer = setInterval(nextSlide, 6000);

// Reset auto-timer on manual interaction
function resetAutoTimer() {
  clearInterval(autoTimer);
  autoTimer = setInterval(nextSlide, 6000);
}

document.getElementById('nextBtn').addEventListener('click', resetAutoTimer);
document.getElementById('prevBtn').addEventListener('click', resetAutoTimer);
navDotsEl.addEventListener('click', resetAutoTimer);

// ── Touch/Swipe support ─────────────────────────
let touchStartY = 0;
let touchStartX = 0;

document.addEventListener('touchstart', (e) => {
  touchStartY = e.touches[0].clientY;
  touchStartX = e.touches[0].clientX;
}, { passive: true });

document.addEventListener('touchend', (e) => {
  const dy = e.changedTouches[0].clientY - touchStartY;
  const dx = e.changedTouches[0].clientX - touchStartX;

  if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 50) {
    if (dy < 0) nextSlide();
    else prevSlide();
    resetAutoTimer();
  } else if (Math.abs(dx) > 50) {
    if (dx < 0) nextSlide();
    else prevSlide();
    resetAutoTimer();
  }
}, { passive: true });

// ── Initial Progress ────────────────────────────
progressBar.style.width = (1 / slidesData.length * 100) + '%';
</script>
</body>
</html>
