<!DOCTYPE html>
<html lang="en">
<head>
<!--
  SVG Morphing Animation
  Inspired by Awwwards "Svg morphing animation" & "Morphing SVG Mask Slider"
  SVG shapes morph smoothly between forms using path interpolation.
  Auto-play or click to cycle. Circle → Star → Blob → Heart → Pentagon
  Pure CSS + Vanilla JS · No dependencies
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Morphing Animation</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#16213e;--primary:#e94560;--accent:#ffc947;
  --accent2:#6c5ce7;--text:#eaeaea;--muted:#7a7a9a;
  --card:#1a1a2e;--border:rgba(233,69,96,.18);--radius:20px;
}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);min-height:100vh;
  display:flex;flex-direction:column;align-items:center;overflow-x:hidden;
}

/* ── background ── */
.bg-glow{position:fixed;inset:0;z-index:0;pointer-events:none}
.bg-glow::before,.bg-glow::after{content:'';position:absolute;border-radius:50%;filter:blur(140px);opacity:.15}
.bg-glow::before{width:600px;height:600px;background:var(--primary);top:-20%;left:-10%}
.bg-glow::after{width:500px;height:500px;background:var(--accent2);bottom:-20%;right:-10%}

/* ── layout ── */
.main{position:relative;z-index:1;width:100%;max-width:900px;padding:40px 20px;display:flex;flex-direction:column;align-items:center;min-height:100vh}

/* ── header ── */
.header{text-align:center;margin-bottom:30px}
.header h1{font-size:2.4rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.header p{color:var(--muted);margin-top:8px;font-size:.95rem}

/* ── morph stage ── */
.morph-stage{
  position:relative;width:100%;max-width:500px;aspect-ratio:1/1;
  display:flex;align-items:center;justify-content:center;margin-bottom:30px;
}

/* ── SVG ── */
.morph-svg{width:100%;height:100%;filter:drop-shadow(0 0 40px rgba(233,69,96,.3))}
.morph-path{
  transition: d 0s;
}

/* ── shape label ── */
.shape-label{
  position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  font-size:1.1rem;font-weight:700;color:var(--text);opacity:.7;
  transition:opacity .3s;
  text-transform:capitalize;
  letter-spacing:2px;
}

/* ── controls ── */
.controls{display:flex;flex-direction:column;align-items:center;gap:20px;width:100%;max-width:600px}

/* ── progress dots ── */
.shape-dots{display:flex;gap:12px;align-items:center}
.shape-dot{
  width:14px;height:14px;border-radius:50%;border:2px solid var(--border);
  background:transparent;cursor:pointer;transition:all .35s;position:relative;
}
.shape-dot:hover{border-color:var(--primary);transform:scale(1.2)}
.shape-dot.active{background:var(--primary);border-color:var(--primary);box-shadow:0 0 14px rgba(233,69,96,.5)}
.shape-dot.active::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:2px solid var(--primary);opacity:.3;animation:dotPulse 1.5s ease infinite}
@keyframes dotPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.3);opacity:0}}

/* ── buttons row ── */
.btn-row{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.btn{
  background:var(--card);border:1px solid var(--border);color:var(--text);
  padding:10px 22px;border-radius:12px;font-size:.88rem;font-weight:600;
  cursor:pointer;transition:all .3s;display:flex;align-items:center;gap:8px;
}
.btn:hover{border-color:var(--primary);background:rgba(233,69,96,.08);transform:translateY(-2px);box-shadow:0 4px 16px rgba(233,69,96,.2)}
.btn.active-toggle{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-icon{font-size:1.1rem}

/* ── speed slider ── */
.speed-row{display:flex;align-items:center;gap:14px;width:100%;max-width:300px}
.speed-label{font-size:.82rem;color:var(--muted);white-space:nowrap}
.speed-slider{
  -webkit-appearance:none;appearance:none;width:100%;height:6px;
  background:var(--surface);border-radius:6px;outline:none;
}
.speed-slider::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--primary);cursor:pointer;
  box-shadow:0 2px 8px rgba(233,69,96,.4);
}

/* ── ring animation ── */
.morph-ring{
  position:absolute;inset:10%;border-radius:50%;border:2px solid rgba(233,69,96,.1);
  animation:ringPulse 3s ease-in-out infinite;pointer-events:none;
}
.morph-ring:nth-child(2){animation-delay:-1s;inset:15%}
.morph-ring:nth-child(3){animation-delay:-2s;inset:20%}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.15}50%{transform:scale(1.1);opacity:.05}}

/* ── color palette ── */
.palette-row{display:flex;gap:8px;margin-top:10px}
.palette-swatch{
  width:28px;height:28px;border-radius:50%;cursor:pointer;
  border:3px solid transparent;transition:all .3s;
}
.palette-swatch:hover{transform:scale(1.15)}
.palette-swatch.active{border-color:#fff;box-shadow:0 0 12px rgba(255,255,255,.3)}

/* ── info text ── */
.info{font-size:.78rem;color:var(--muted);text-align:center;margin-top:16px;line-height:1.6}
</style>
</head>
<body>

<div class="bg-glow"></div>

<div class="main">
  <header class="header">
    <h1>SVG Morphing</h1>
    <p>Smooth shape transitions with path interpolation</p>
  </header>

  <!-- Morph Stage -->
  <div class="morph-stage" id="morphStage">
    <div class="morph-ring"></div>
    <div class="morph-ring"></div>
    <div class="morph-ring"></div>

    <svg class="morph-svg" id="morphSvg" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="shapeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
          <stop offset="0%" style="stop-color:#e94560;stop-opacity:1" />
          <stop offset="100%" style="stop-color:#ffc947;stop-opacity:1" />
        </linearGradient>
      </defs>
      <path id="morphPath" d="" fill="url(#shapeGrad)" />
    </svg>
    <div class="shape-label" id="shapeLabel">Circle</div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <!-- Dots -->
    <div class="shape-dots" id="shapeDots"></div>

    <!-- Buttons -->
    <div class="btn-row">
      <button class="btn active-toggle" id="playBtn">
        <span class="btn-icon">⏸</span> Pause
      </button>
      <button class="btn" id="prevBtn">
        <span class="btn-icon">◀</span> Prev
      </button>
      <button class="btn" id="nextBtn">
        <span class="btn-icon">▶</span> Next
      </button>
    </div>

    <!-- Speed -->
    <div class="speed-row">
      <span class="speed-label">Speed</span>
      <input type="range" class="speed-slider" id="speedSlider" min="200" max="3000" value="1200" step="100">
      <span class="speed-label" id="speedValue">1.2s</span>
    </div>

    <!-- Colors -->
    <div class="palette-row" id="paletteRow"></div>

    <div class="info">Click any dot to jump to a shape · Use controls to navigate · Auto-morphs between shapes</div>
  </div>
</div>

<script>
/* ══════════════════════════════════════════
   SVG Path definitions for morph targets
   All paths use same viewBox 500×500, centered
   ══════════════════════════════════════════ */

const SHAPES = [
  {
    name: 'circle',
    path: 'M250,50 A200,200 0 1,1 249.99,50 Z'
  },
  {
    name: 'star',
    path: (function(){
      /* 5-pointed star */
      const cx=250,cy=250,outer=200,inner=80;
      let d='';
      for(let i=0;i<10;i++){
        const r=i%2===0?outer:inner;
        const angle=(Math.PI/2*3)+(i*Math.PI/5);
        const x=cx+Math.cos(angle)*r;
        const y=cy+Math.sin(angle)*r;
        d+=(i===0?'M':'L')+x.toFixed(2)+','+y.toFixed(2)+' ';
      }
      return d+'Z';
    })()
  },
  {
    name: 'blob',
    path: 'M250,50 C380,20 470,130 450,250 C430,370 340,460 250,450 C160,440 60,360 50,250 C40,140 120,80 250,50 Z'
  },
  {
    name: 'heart',
    path: 'M250,420 C160,340 40,260 40,150 C40,80 100,40 160,40 C210,40 240,70 250,100 C260,70 290,40 340,40 C400,40 460,80 460,150 C460,260 340,340 250,420 Z'
  },
  {
    name: 'pentagon',
    path: (function(){
      const cx=250,cy=260,r=200;
      let d='';
      for(let i=0;i<5;i++){
        const angle=(Math.PI/2*3)+(i*2*Math.PI/5);
        const x=cx+Math.cos(angle)*r;
        const y=cy+Math.sin(angle)*r;
        d+=(i===0?'M':'L')+x.toFixed(2)+','+y.toFixed(2)+' ';
      }
      return d+'Z';
    })()
  },
  {
    name: 'diamond',
    path: 'M250,50 L450,250 L250,450 L50,250 Z'
  },
  {
    name: 'cross',
    path: 'M180,50 L320,50 L320,180 L450,180 L450,320 L320,320 L320,450 L180,450 L180,320 L50,320 L50,180 L180,180 Z'
  }
];

/* ── Color palettes ── */
const PALETTES = [
  { name:'Sunset', colors:['#e94560','#ffc947'], gradient:'linear-gradient(135deg,#e94560,#ffc947)' },
  { name:'Ocean', colors:['#00cec9','#6c5ce7'], gradient:'linear-gradient(135deg,#00cec9,#6c5ce7)' },
  { name:'Aurora', colors:['#a29bfe','#00b894'], gradient:'linear-gradient(135deg,#a29bfe,#00b894)' },
  { name:'Flame', colors:['#fd7e14','#e94560'], gradient:'linear-gradient(135deg,#fd7e14,#e94560)' },
  { name:'Ice', colors:['#74b9ff','#dfe6e9'], gradient:'linear-gradient(135deg,#74b9ff,#dfe6e9)' }
];

/* ── State ── */
let currentShape = 0;
let targetShape = 0;
let playing = true;
let morphDuration = 1200;
let morphStartTime = 0;
let animId = null;
let autoTimer = null;
let currentPalette = 0;

const morphPath = document.getElementById('morphPath');
const shapeLabel = document.getElementById('shapeLabel');
const shapeDots = document.getElementById('shapeDots');
const playBtn = document.getElementById('playBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const speedSlider = document.getElementById('speedSlider');
const speedValue = document.getElementById('speedValue');
const paletteRow = document.getElementById('paletteRow');
const gradStop1 = document.querySelector('#shapeGrad stop:first-child');
const gradStop2 = document.querySelector('#shapeGrad stop:last-child');

/* ── Normalize path to same number of points ──
   We'll interpolate between two cubic bezier paths.
   For simplicity, we'll break each path into same-number of segments.
*/
function pathToPoints(d, n=80) {
  /* Create a temporary path, sample points along it */
  const tmp = document.createElementNS('http://www.w3.org/2000/svg','path');
  tmp.setAttribute('d', d);
  document.getElementById('morphSvg').appendChild(tmp);
  tmp.style.display='none';
  const len = tmp.getTotalLength();
  const pts = [];
  for(let i=0;i<=n;i++){
    const pt = tmp.getPointAtLength((i/n)*len);
    pts.push({x:pt.x, y:pt.y});
  }
  tmp.remove();
  return pts;
}

function pointsToPath(pts) {
  if(pts.length<2) return '';
  let d = `M${pts[0].x.toFixed(2)},${pts[0].y.toFixed(2)}`;
  /* Use Catmull-Rom → Cubic Bezier conversion for smoothness */
  for(let i=0;i<pts.length-1;i++){
    const p0 = pts[Math.max(i-1,0)];
    const p1 = pts[i];
    const p2 = pts[Math.min(i+1,pts.length-1)];
    const p3 = pts[Math.min(i+2,pts.length-1)];
    const cp1x = p1.x + (p2.x - p0.x)/6;
    const cp1y = p1.y + (p2.y - p0.y)/6;
    const cp2x = p2.x - (p3.x - p1.x)/6;
    const cp2y = p2.y - (p3.y - p1.y)/6;
    d += ` C${cp1x.toFixed(2)},${cp1y.toFixed(2)} ${cp2x.toFixed(2)},${cp2y.toFixed(2)} ${p2.x.toFixed(2)},${p2.y.toFixed(2)}`;
  }
  return d + ' Z';
}

/* Pre-compute points for all shapes */
const N = 120;
const shapePoints = SHAPES.map(s => pathToPoints(s.path, N));

/* ── Interpolate between two point sets ── */
function easeInOutCubic(t) {
  return t < 0.5 ? 4*t*t*t : 1 - Math.pow(-2*t+2,3)/2;
}

function lerpPoints(a, b, t) {
  return a.map((p,i) => ({
    x: p.x + (b[i].x - p.x)*t,
    y: p.y + (b[i].y - p.y)*t
  }));
}

/* ── Morph Engine ── */
function morphTo(index) {
  currentShape = targetShape;
  targetShape = index;
  morphStartTime = performance.now();
  if(!animId) animFrame();
}

let fromPoints = shapePoints[0];
let toPoints = shapePoints[0];

function animFrame() {
  const elapsed = performance.now() - morphStartTime;
  let t = Math.min(elapsed / morphDuration, 1);
  t = easeInOutCubic(t);

  const interpolated = lerpPoints(shapePoints[currentShape], shapePoints[targetShape], t);
  const d = pointsToPath(interpolated);
  morphPath.setAttribute('d', d);

  /* Update label with cross-fade */
  if(t > 0.5) {
    shapeLabel.textContent = SHAPES[targetShape].name;
  }

  if(t < 1) {
    animId = requestAnimationFrame(animFrame);
  } else {
    currentShape = targetShape;
    animId = null;
    updateDots();
  }
}

function scheduleAuto() {
  clearTimeout(autoTimer);
  if(playing) {
    autoTimer = setTimeout(() => {
      const next = (targetShape + 1) % SHAPES.length;
      morphTo(next);
      scheduleAuto();
    }, morphDuration + 1500);
  }
}

/* ── Build dots ── */
SHAPES.forEach((s,i) => {
  const dot = document.createElement('div');
  dot.className = 'shape-dot' + (i===0?' active':'');
  dot.title = s.name;
  dot.addEventListener('click', () => {
    morphTo(i);
    scheduleAuto();
  });
  shapeDots.appendChild(dot);
});

function updateDots() {
  shapeDots.querySelectorAll('.shape-dot').forEach((d,i) => {
    d.classList.toggle('active', i === targetShape);
  });
}

/* ── Build palette ── */
PALETTES.forEach((p,i) => {
  const swatch = document.createElement('div');
  swatch.className = 'palette-swatch' + (i===0?' active':'');
  swatch.style.background = p.gradient;
  swatch.title = p.name;
  swatch.addEventListener('click', () => {
    currentPalette = i;
    gradStop1.setAttribute('stop-color', p.colors[0]);
    gradStop2.setAttribute('stop-color', p.colors[1]);
    paletteRow.querySelectorAll('.palette-swatch').forEach((s,j) => s.classList.toggle('active', j===i));
  });
  paletteRow.appendChild(swatch);
});

/* ── Controls ── */
playBtn.addEventListener('click', () => {
  playing = !playing;
  playBtn.innerHTML = playing ? '<span class="btn-icon">⏸</span> Pause' : '<span class="btn-icon">▶</span> Play';
  playBtn.classList.toggle('active-toggle', playing);
  if(playing) scheduleAuto();
  else clearTimeout(autoTimer);
});

prevBtn.addEventListener('click', () => {
  const prev = (targetShape - 1 + SHAPES.length) % SHAPES.length;
  morphTo(prev);
  scheduleAuto();
});

nextBtn.addEventListener('click', () => {
  const next = (targetShape + 1) % SHAPES.length;
  morphTo(next);
  scheduleAuto();
});

speedSlider.addEventListener('input', () => {
  morphDuration = parseInt(speedSlider.value);
  speedValue.textContent = (morphDuration/1000).toFixed(1)+'s';
});

/* ── Init ── */
morphPath.setAttribute('d', pointsToPath(shapePoints[0]));
shapeLabel.textContent = SHAPES[0].name;
scheduleAuto();
</script>
</body>
</html>
