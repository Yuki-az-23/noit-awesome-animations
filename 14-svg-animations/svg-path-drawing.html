<!--
  ============================================================
  SVG Path Drawing – Stroke-by-Stroke Animations
  Part of: CSS+JS Animations Library / 14-svg-animations
  Pure CSS + Vanilla JS · No external dependencies
  ============================================================
-->
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SVG Path Drawing Animations</title>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --color-bg:#0f0f1a;
    --color-surface:#16213e;
    --color-primary:#e94560;
    --color-primary-light:#ff6b81;
    --color-text:#eaeaea;
    --color-text-muted:#7f8c9b;
  }
  body{
    font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
    background:var(--color-bg);color:var(--color-text);
    min-height:100vh;display:flex;flex-direction:column;
    align-items:center;padding:60px 20px;
  }
  h1{
    font-size:2rem;font-weight:700;
    background:linear-gradient(135deg,var(--color-primary),var(--color-primary-light));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    margin-bottom:8px;text-align:center;
  }
  .subtitle{color:var(--color-text-muted);font-size:.95rem;margin-bottom:48px;text-align:center}

  .drawing-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
    gap:28px;max-width:900px;width:100%;
  }

  .drawing-card{
    background:var(--color-surface);
    border-radius:20px;padding:32px 24px;
    display:flex;flex-direction:column;align-items:center;gap:16px;
    box-shadow:0 4px 24px rgba(0,0,0,.3);
    transition:transform .3s ease, box-shadow .3s ease;
  }
  .drawing-card:hover{transform:translateY(-4px);box-shadow:0 8px 32px rgba(0,0,0,.5)}

  .drawing-card svg{
    width:200px;height:200px;
    filter:drop-shadow(0 0 12px rgba(233,69,96,.25));
  }

  .drawing-label{
    font-size:.8rem;font-weight:700;text-transform:uppercase;
    letter-spacing:1.5px;color:var(--color-primary);opacity:.8;
  }

  .drawing-status{
    font-size:.75rem;color:var(--color-text-muted);
    transition:opacity .3s ease;
  }
  .drawing-status.drawn{color:var(--color-primary-light)}

  /* ── Stroke Drawing Base ── */
  .draw-path{
    stroke-dasharray:var(--dash-len);
    stroke-dashoffset:var(--dash-len);
    transition:stroke-dashoffset 2s ease, fill-opacity 0.6s ease;
  }
  .draw-path.animate{
    stroke-dashoffset:0;
  }
  .draw-path.filled{
    fill-opacity:1;
  }

  /* Replay button */
  .replay-btn{
    margin-top:4px;
    padding:6px 16px;
    background:transparent;
    border:1px solid var(--color-primary);
    border-radius:20px;
    color:var(--color-primary);
    font-size:.75rem;font-weight:600;
    cursor:pointer;
    transition:background .2s ease, transform .15s ease;
  }
  .replay-btn:hover{background:var(--color-primary);color:#fff}
  .replay-btn:active{transform:scale(.95)}


  /* Glow filter for SVGs */
  .glow-filter{filter:drop-shadow(0 0 8px rgba(233,69,96,.4))}
</style>
</head>
<body>

<h1>SVG Path Drawing</h1>
<p class="subtitle">Illustrations draw themselves when scrolled into view</p>

<div class="drawing-grid">

  <!-- 1. Circle -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow1"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <circle class="draw-path" data-dash="565" data-name="circle"
        cx="100" cy="100" r="80"
        fill="none" stroke="#e94560" stroke-width="3"
        filter="url(#glow1)"
        style="--dash-len:565"/>
      <circle cx="100" cy="100" r="60"
        fill="#e94560" fill-opacity="0" class="draw-fill"
        opacity="0.15"/>
    </svg>
    <span class="drawing-label">Circle</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

  <!-- 2. Star -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow2"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <polygon class="draw-path" data-dash="690" data-name="star"
        points="100,15 123,78 190,78 135,118 155,182 100,145 45,182 65,118 10,78 77,78"
        fill="none" stroke="#ff6b81" stroke-width="2.5" stroke-linejoin="round"
        filter="url(#glow2)"
        style="--dash-len:690"/>
    </svg>
    <span class="drawing-label">Star</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

  <!-- 3. House -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow3"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path class="draw-path" data-dash="640" data-name="house"
        d="M30 110 L100 40 L170 110 M30 110 L30 175 L170 175 L170 110 M65 175 L65 130 L135 130 L135 175 M75 95 L95 95 L95 110 L75 110 Z M120 85 L140 85 L140 105 L120 105 Z"
        fill="none" stroke="#fbbf24" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"
        filter="url(#glow3)"
        style="--dash-len:640"/>
    </svg>
    <span class="drawing-label">House</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

  <!-- 4. Wave -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow4"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path class="draw-path" data-dash="500" data-name="wave1"
        d="M10 100 Q35 50, 60 100 T110 100 T160 100 T200 80"
        fill="none" stroke="#10b981" stroke-width="3" stroke-linecap="round"
        filter="url(#glow4)"
        style="--dash-len:500"/>
      <path class="draw-path" data-dash="500" data-name="wave2"
        d="M10 120 Q35 80, 60 120 T110 120 T160 120 T200 100"
        fill="none" stroke="#10b981" stroke-width="2" stroke-linecap="round" opacity=".5"
        style="--dash-len:500; transition-delay:.3s"/>
      <path class="draw-path" data-dash="500" data-name="wave3"
        d="M10 140 Q35 110, 60 140 T110 140 T160 140 T200 125"
        fill="none" stroke="#10b981" stroke-width="1.5" stroke-linecap="round" opacity=".3"
        style="--dash-len:500; transition-delay:.6s"/>
    </svg>
    <span class="drawing-label">Wave</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

  <!-- 5. Heartbeat -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow5"><feGaussianBlur stdDeviation="2" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <path class="draw-path" data-dash="600" data-name="heartbeat"
        d="M10 120 L40 120 L55 120 L65 60 L80 160 L95 60 L110 140 L120 120 L140 120 L155 80 L165 120 L190 120"
        fill="none" stroke="#e94560" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#glow5)"
        style="--dash-len:600"/>
      <!-- heart icon above -->
      <path class="draw-path" data-dash="240" data-name="heart-icon"
        d="M100 75 C100 55, 130 35, 140 55 C150 75, 100 110, 100 110 C100 110, 50 75, 60 55 C70 35, 100 55, 100 75Z"
        fill="none" stroke="#ff6b81" stroke-width="2" stroke-linecap="round"
        filter="url(#glow5)"
        style="--dash-len:240; transition-delay:.4s"/>
    </svg>
    <span class="drawing-label">Heartbeat</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

  <!-- 6. Geometric Pattern -->
  <div class="drawing-card" data-drawing>
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <filter id="glow6"><feGaussianBlur stdDeviation="2.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
      </defs>
      <!-- Hexagon -->
      <polygon class="draw-path" data-dash="500" data-name="hex"
        points="100,25 169,62 169,138 100,175 31,138 31,62"
        fill="none" stroke="#7c3aed" stroke-width="2" stroke-linejoin="round"
        filter="url(#glow6)"
        style="--dash-len:500"/>
      <!-- Inner triangle 1 -->
      <polygon class="draw-path" data-dash="420" data-name="tri1"
        points="100,50 155,125 45,125"
        fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linejoin="round" opacity=".7"
        style="--dash-len:420; transition-delay:.5s"/>
      <!-- Inner triangle 2 -->
      <polygon class="draw-path" data-dash="420" data-name="tri2"
        points="100,150 155,75 45,75"
        fill="none" stroke="#c4b5fd" stroke-width="1.5" stroke-linejoin="round" opacity=".5"
        style="--dash-len:420; transition-delay:.8s"/>
      <!-- Center dot -->
      <circle class="draw-path" data-dash="25" data-name="center-dot"
        cx="100" cy="100" r="4"
        fill="#7c3aed" fill-opacity="0" stroke="#7c3aed" stroke-width="2"
        style="--dash-len:25; transition-delay:1.1s"/>
    </svg>
    <span class="drawing-label">Geometric Pattern</span>
    <span class="drawing-status" data-status>Scroll to draw</span>
    <button class="replay-btn" data-replay>↻ Replay</button>
  </div>

</div>

<script>
(function(){
  const cards = document.querySelectorAll('[data-drawing]');

  function calculateDashLength(el){
    // Try to get total length from SVG geometry methods
    const tag = el.tagName.toLowerCase();
    if(tag === 'path' || tag === 'polygon' || tag === 'polyline'){
      // Use getPathData or approximated length
      const temp = document.createElementNS('http://www.w3.org/2000/svg','path');
      const d = el.getAttribute('d') || el.getAttribute('points');
      if(tag === 'polygon' || tag === 'polyline'){
        temp.setAttribute('d','M' + el.getAttribute('points').trim().replace(/\s+/g,' L'));
        if(tag === 'polygon') temp.setAttribute('d', temp.getAttribute('d') + ' Z');
        const svg = el.closest('svg');
        const clone = svg.appendChild(temp);
        const len = temp.getTotalLength();
        svg.removeChild(temp);
        return len;
      }
    }
    // Use circle circumference
    if(tag === 'circle'){
      const r = parseFloat(el.getAttribute('r')) || 1;
      return 2 * Math.PI * r;
    }
    return parseFloat(el.dataset.dash) || 500;
  }

  function setupPaths(card){
    const paths = card.querySelectorAll('.draw-path');
    paths.forEach(p=>{
      const tag = p.tagName.toLowerCase();
      let len;

      if(tag === 'path'){
        try{ len = p.getTotalLength(); } catch(e){ len = parseFloat(p.dataset.dash) || 500; }
      } else if(tag === 'polygon' || tag === 'polyline'){
        // Create temp path to measure
        const svg = p.closest('svg');
        const tempPath = document.createElementNS('http://www.w3.org/2000/svg','path');
        const pts = p.getAttribute('points').trim();
        let d = 'M' + pts.replace(/\s+/g,' L');
        if(tag === 'polygon') d += ' Z';
        tempPath.setAttribute('d', d);
        svg.appendChild(tempPath);
        try{ len = tempPath.getTotalLength(); } catch(e){ len = parseFloat(p.dataset.dash) || 500; }
        svg.removeChild(tempPath);
      } else if(tag === 'circle'){
        const r = parseFloat(p.getAttribute('r')) || 1;
        len = 2 * Math.PI * r;
      } else {
        len = parseFloat(p.dataset.dash) || 500;
      }

      // Set dasharray and initial dashoffset
      p.style.strokeDasharray = len;
      p.style.strokeDashoffset = len;
      // Store for reset
      p._dashLen = len;
      p.classList.remove('animate');
    });
  }

  function animatePaths(card){
    const paths = card.querySelectorAll('.draw-path');
    paths.forEach(p=>{
      p.style.strokeDashoffset = '0';
      p.classList.add('animate');
    });
    const status = card.querySelector('[data-status]');
    if(status) status.textContent = '✓ Drawn';
    if(status) status.classList.add('drawn');
  }

  function resetPaths(card){
    const paths = card.querySelectorAll('.draw-path');
    paths.forEach(p=>{
      p.style.transition = 'none';
      p.style.strokeDashoffset = p._dashLen;
      p.classList.remove('animate');
      // Force reflow then restore transitions
      p.getBoundingClientRect();
      p.style.transition = '';
    });
    const status = card.querySelector('[data-status]');
    if(status) status.textContent = 'Scroll to draw';
    if(status) status.classList.remove('drawn');
  }

  // IntersectionObserver for scroll-triggered drawing
  const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
      if(entry.isIntersecting){
        const card = entry.target;
        const alreadyDrawn = card.querySelector('.draw-path.animate');
        if(!alreadyDrawn){
          // Small delay for visual impact
          setTimeout(()=> animatePaths(card), 200);
        }
        observer.unobserve(card);
      }
    });
  }, { threshold:0.3 });

  // Initialize each card
  cards.forEach(card => {
    setupPaths(card);
    observer.observe(card);

    // Replay button
    const replayBtn = card.querySelector('[data-replay]');
    if(replayBtn){
      replayBtn.addEventListener('click', ()=>{
        resetPaths(card);
        setTimeout(()=> animatePaths(card), 100);
      });
    }
  });
})();
</script>
</body>
</html>
