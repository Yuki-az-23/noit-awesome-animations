<!DOCTYPE html>
<html lang="en">
<head>
  <!--
    Bouncing Line Animation
    Inspired by "Bouncing line animation - Locomotive"
    Animated lines that bounce, stretch, and snap like elastic.
    Multiple lines with different timing creating a rhythmic pattern.
    Clean, minimal aesthetic. Pure CSS + Vanilla JS. No external dependencies.
  -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bouncing Line Animation</title>
  <style>
    :root {
      --color-bg: #0f0f1a;
      --color-surface: #16213e;
      --color-primary: #e94560;
      --color-text: #eaeaea;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--color-bg);
      color: var(--color-text);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    /* ── Canvas ── */
    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* ── UI Overlay ── */
    .ui-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
      z-index: 10;
    }

    .header {
      padding: 2rem;
    }

    .header h1 {
      font-size: clamp(1.5rem, 4vw, 3rem);
      font-weight: 900;
      letter-spacing: -0.03em;
      line-height: 1;
      background: linear-gradient(135deg, var(--color-primary), #ff6b35, #ffe600);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .header p {
      font-size: 0.8rem;
      color: #4a5568;
      margin-top: 0.5rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ── Controls ── */
    .controls {
      position: fixed;
      bottom: 2rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 0.75rem;
      pointer-events: all;
      z-index: 10;
    }

    .ctrl-btn {
      padding: 0.5rem 1.2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
      background: rgba(15, 15, 26, 0.9);
      color: #8892b0;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      cursor: pointer;
      transition: all 0.3s;
      border-radius: 6px;
      backdrop-filter: blur(10px);
      font-family: inherit;
    }

    .ctrl-btn:hover, .ctrl-btn.active {
      background: rgba(233, 69, 96, 0.2);
      color: #e94560;
      border-color: rgba(233, 69, 96, 0.4);
    }

    /* ── Info corner ── */
    .info-corner {
      position: fixed;
      top: 2rem;
      right: 2rem;
      text-align: right;
      font-size: 0.7rem;
      color: #2a3a4e;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      z-index: 10;
      font-variant-numeric: tabular-nums;
    }

    .info-corner .stat-val {
      color: #3a4a5e;
      font-weight: 600;
    }

    /* ── Hint ── */
    .hint {
      position: fixed;
      bottom: 5.5rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.7rem;
      color: #3a4a5e;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      z-index: 10;
      animation: hint-pulse 3s ease-in-out infinite;
    }

    @keyframes hint-pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 0.8; }
    }
  </style>
</head>
<body>

  <canvas id="canvas"></canvas>

  <!-- UI Overlay -->
  <div class="ui-overlay">
    <div class="header">
      <h1>Bouncing Lines</h1>
      <p>Elastic rhythm animation</p>
    </div>
  </div>

  <div class="info-corner">
    <div>Lines: <span class="stat-val" id="lineCount">8</span></div>
    <div>FPS: <span class="stat-val" id="fpsCount">60</span></div>
    <div>Mode: <span class="stat-val" id="modeLabel">Wave</span></div>
  </div>

  <div class="hint">Move mouse to interact · Click to add lines</div>

  <div class="controls">
    <button class="ctrl-btn active" data-mode="wave">Wave</button>
    <button class="ctrl-btn" data-mode="bounce">Bounce</button>
    <button class="ctrl-btn" data-mode="elastic">Elastic</button>
    <button class="ctrl-btn" data-mode="chaos">Chaos</button>
    <button class="ctrl-btn" data-mode="reset">Reset</button>
  </div>

  <script>
    // ── Canvas setup ──
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    let W, H;

    function resize() {
      W = canvas.width = window.innerWidth;
      H = canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    // ── Color palette ──
    const colors = [
      '#e94560', '#ff6b35', '#ffe600', '#4ecca3',
      '#00d4ff', '#3a86ff', '#b829dd', '#ff2d95',
      '#cd7f32', '#4ecca3', '#00b4d8', '#6c5ce7'
    ];

    // ── Line class ──
    class BouncingLine {
      constructor(config = {}) {
        this.x = config.x || Math.random() * W;
        this.y = config.y || Math.random() * H;
        this.baseY = this.y;
        this.length = config.length || 150 + Math.random() * 250;
        this.thickness = config.thickness || 2 + Math.random() * 4;
        this.color = config.color || colors[Math.floor(Math.random() * colors.length)];
        this.amplitude = config.amplitude || 50 + Math.random() * 100;
        this.frequency = config.frequency || 0.5 + Math.random() * 2;
        this.phase = config.phase || Math.random() * Math.PI * 2;
        this.speed = config.speed || 1 + Math.random() * 2;
        this.damping = 0.98;
        this.vx = 0;
        this.vy = 0;
        this.targetY = this.baseY;
        this.stretchFactor = 1;
        this.time = Math.random() * 100;
        this.opacity = 0.6 + Math.random() * 0.4;
        this.style = config.style || 'curve'; // 'curve', 'straight', 'zigzag'
        this.points = [];
        this.numPoints = 20;
        this.mousedist = Infinity;
      }

      update(mode, mouseX, mouseY, dt) {
        this.time += dt * 0.01 * this.speed;
        
        // Calculate mouse distance
        const dx = mouseX - this.x;
        const dy = mouseY - this.y;
        this.mousedist = Math.sqrt(dx * dx + dy * dy);
        const mouseInfluence = Math.max(0, 1 - this.mousedist / 300);

        switch (mode) {
          case 'wave':
            // Smooth wave motion
            this.y = this.baseY + Math.sin(this.time * this.frequency + this.phase) * this.amplitude;
            this.stretchFactor = 1 + Math.sin(this.time * this.frequency * 0.5) * 0.15;
            if (mouseInfluence > 0) {
              this.y += (mouseY - this.y) * mouseInfluence * 0.3;
              this.stretchFactor += mouseInfluence * 0.2;
            }
            break;

          case 'bounce':
            // Bouncing with physics
            const bounceTarget = this.baseY + Math.sin(this.time * this.frequency + this.phase) * this.amplitude;
            this.vy += (bounceTarget - this.y) * 0.05;
            this.vy *= 0.85; // Bounce damping
            this.y += this.vy;
            this.stretchFactor = 1 + Math.abs(this.vy) * 0.005;
            if (mouseInfluence > 0) {
              this.vy += (mouseY - this.y) * mouseInfluence * 0.02;
            }
            break;

          case 'elastic':
            // Elastic snap back
            const elasticTarget = this.baseY + Math.sin(this.time * this.frequency + this.phase) * this.amplitude;
            const force = (elasticTarget - this.y) * 0.08;
            this.vy += force;
            this.vy *= 0.92; // Less damping = more spring
            this.y += this.vy;
            this.stretchFactor = 1 + (this.vy * 0.003);
            if (mouseInfluence > 0) {
              this.vy += (mouseY - this.y) * mouseInfluence * 0.1;
              this.stretchFactor += mouseInfluence * 0.3;
            }
            break;

          case 'chaos':
            // Chaotic motion
            this.y += Math.sin(this.time * this.frequency * 3 + this.phase) * 3;
            this.y += Math.cos(this.time * 2.7 + this.phase * 1.3) * 2;
            this.vy += (this.baseY - this.y) * 0.01;
            this.vy += (Math.random() - 0.5) * 2;
            this.vy *= 0.95;
            this.y += this.vy;
            this.stretchFactor = 1 + Math.sin(this.time * 5) * 0.3;
            if (mouseInfluence > 0) {
              this.y += (mouseY - this.y) * mouseInfluence * 0.5;
            }
            break;
        }

        // Calculate line points
        this.points = [];
        for (let i = 0; i <= this.numPoints; i++) {
          const t = i / this.numPoints;
          const px = this.x - this.length / 2 + t * this.length;
          let py = this.y;

          // Add wave motion along the line
          const waveOffset = Math.sin(t * Math.PI * 2 + this.time * this.frequency) * 
                            this.amplitude * 0.3 * this.stretchFactor;
          
          // Mode-specific point behavior
          if (mode === 'elastic') {
            py += waveOffset * (1 + Math.abs(Math.sin(t * Math.PI)) * Math.abs(this.vy) * 0.01);
          } else if (mode === 'zigzag') {
            py += (i % 2 === 0 ? 1 : -1) * this.amplitude * 0.5;
          } else {
            py += waveOffset;
          }

          // Mouse distortion
          if (mouseInfluence > 0) {
            const ptDx = px - mouseX;
            const ptDy = py - mouseY;
            const ptDist = Math.sqrt(ptDx * ptDx + ptDy * ptDy);
            if (ptDist < 200) {
              const influence = Math.max(0, 1 - ptDist / 200) * mouseInfluence;
              py += (mouseY - py) * influence * 0.2;
            }
          }

          this.points.push({ x: px, y: py });
        }
      }

      draw(ctx) {
        if (this.points.length < 2) return;

        ctx.save();
        ctx.globalAlpha = this.opacity;
        ctx.strokeStyle = this.color;
        ctx.lineWidth = this.thickness;
        ctx.lineCap = 'round';
        ctx.lineJoin = 'round';

        // Glow effect
        ctx.shadowColor = this.color;
        ctx.shadowBlur = 15;

        ctx.beginPath();
        ctx.moveTo(this.points[0].x, this.points[0].y);

        // Smooth curve through points
        for (let i = 0; i < this.points.length - 1; i++) {
          const curr = this.points[i];
          const next = this.points[i + 1];
          const cpX = (curr.x + next.x) / 2;
          const cpY = (curr.y + next.y) / 2;
          ctx.quadraticCurveTo(curr.x, curr.y, cpX, cpY);
        }

        // Last point
        const last = this.points[this.points.length - 1];
        ctx.lineTo(last.x, last.y);

        ctx.stroke();

        // Draw endpoint circles
        ctx.shadowBlur = 0;
        ctx.fillStyle = this.color;
        
        const first = this.points[0];
        const radius = this.thickness * 1.2;
        ctx.beginPath();
        ctx.arc(first.x, first.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(last.x, last.y, radius, 0, Math.PI * 2);
        ctx.fill();

        ctx.restore();
      }
    }

    // ── State ──
    let lines = [];
    let currentMode = 'wave';
    let mouseX = W / 2;
    let mouseY = H / 2;
    let lastTime = performance.now();
    let frameCount = 0;
    let fps = 60;
    let lastFpsTime = performance.now();

    // ── Initialize lines ──
    function initLines(count = 8) {
      lines = [];
      const numLines = Math.min(count, 20);
      for (let i = 0; i < numLines; i++) {
        lines.push(new BouncingLine({
          x: W * 0.15 + (i / (numLines - 1)) * W * 0.7,
          y: H * 0.3 + Math.random() * H * 0.4,
          length: W * 0.4 + Math.random() * W * 0.3,
          thickness: 2 + Math.random() * 3,
          amplitude: 40 + Math.random() * 80,
          frequency: 0.8 + Math.random() * 1.5,
          phase: (i / numLines) * Math.PI * 2,
          speed: 0.8 + Math.random() * 1.5,
          color: colors[i % colors.length]
        }));
      }
      document.getElementById('lineCount').textContent = lines.length;
    }

    initLines(8);

    // ── Animation loop ──
    function animate(now) {
      const dt = Math.min(now - lastTime, 32); // Cap at ~30fps min
      lastTime = now;

      // FPS counter
      frameCount++;
      if (now - lastFpsTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastFpsTime = now;
        document.getElementById('fpsCount').textContent = fps;
      }

      // Clear with trail effect
      ctx.fillStyle = 'rgba(15, 15, 26, 0.15)';
      ctx.fillRect(0, 0, W, H);

      // Draw subtle grid
      ctx.strokeStyle = 'rgba(255, 255, 255, 0.015)';
      ctx.lineWidth = 1;
      for (let y = 0; y < H; y += 60) {
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
        ctx.stroke();
      }
      for (let x = 0; x < W; x += 60) {
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
        ctx.stroke();
      }

      // Update and draw lines
      lines.forEach(line => {
        line.update(currentMode, mouseX, mouseY, dt);
        line.draw(ctx);
      });

      // Draw connecting lines between nearby line endpoints (subtle)
      ctx.strokeStyle = 'rgba(233, 69, 96, 0.05)';
      ctx.lineWidth = 1;
      for (let i = 0; i < lines.length - 1; i++) {
        if (lines[i].points.length > 0 && lines[i + 1].points.length > 0) {
          const midpoint1 = lines[i].points[Math.floor(lines[i].points.length / 2)];
          const midpoint2 = lines[i + 1].points[Math.floor(lines[i + 1].points.length / 2)];
          ctx.beginPath();
          ctx.moveTo(midpoint1.x, midpoint1.y);
          ctx.lineTo(midpoint2.x, midpoint2.y);
          ctx.stroke();
        }
      }

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);

    // ── Mouse tracking ──
    canvas.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
    });

    canvas.addEventListener('touchmove', (e) => {
      e.preventDefault();
      mouseX = e.touches[0].clientX;
      mouseY = e.touches[0].clientY;
    }, { passive: false });

    // ── Click to add line ──
    canvas.addEventListener('click', (e) => {
      if (lines.length >= 20) {
        // Remove oldest
        lines.shift();
      }
      lines.push(new BouncingLine({
        x: e.clientX,
        y: e.clientY,
        length: W * 0.3 + Math.random() * W * 0.3,
        thickness: 2 + Math.random() * 4,
        amplitude: 40 + Math.random() * 100,
        frequency: 0.5 + Math.random() * 2,
        phase: Math.random() * Math.PI * 2,
        speed: 0.8 + Math.random() * 2,
        color: colors[Math.floor(Math.random() * colors.length)]
      }));
      document.getElementById('lineCount').textContent = lines.length;
    });

    // ── Mode buttons ──
    const modeButtons = document.querySelectorAll('.ctrl-btn');
    modeButtons.forEach(btn => {
      btn.addEventListener('click', () => {
        const mode = btn.dataset.mode;
        
        if (mode === 'reset') {
          initLines(8);
          return;
        }

        modeButtons.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentMode = mode;
        document.getElementById('modeLabel').textContent = 
          mode.charAt(0).toUpperCase() + mode.slice(1);
      });
    });

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      switch(e.key) {
        case '1': modeButtons[0].click(); break;
        case '2': modeButtons[1].click(); break;
        case '3': modeButtons[2].click(); break;
        case '4': modeButtons[3].click(); break;
        case 'r': modeButtons[4].click(); break;
      }
    });

    // ── Handle window resize ──
    window.addEventListener('resize', () => {
      resize();
      // Reposition lines
      lines.forEach((line, i) => {
        line.x = W * 0.15 + (i / Math.max(lines.length - 1, 1)) * W * 0.7;
        line.baseY = H * 0.3 + (i / lines.length) * H * 0.4;
      });
    });
  </script>
</body>
</html>
