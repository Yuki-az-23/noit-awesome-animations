<!DOCTYPE html>
<html lang="en">
<head>
<!--
  ============================================================
  LATERAL SLIDER - Smooth Momentum-Based Content Slider
  ============================================================
  5 Slides with navigation dots, smooth CSS transform easing,
  and momentum-based drag interaction.
  Pure CSS + Vanilla JS | No Dependencies
  ============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lateral Slider - CSS/JS Animations</title>
<style>
  /* ========== ROOT & RESET ========== */
  :root {
    --color-bg: #0f0f1a;
    --color-surface: #16213e;
    --color-primary: #e94560;
    --color-secondary: #533483;
    --color-accent: #0f3460;
    --color-text: #eaeaea;
    --color-text-dim: #8892a4;
    --radius: 16px;
    --ease-smooth: cubic-bezier(0.4, 0, 0.2, 1);
  }

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* ========== HEADER ========== */
  .slider-header {
    text-align: center;
    padding: 30px 20px 10px;
    flex-shrink: 0;
  }
  .slider-header h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 700;
    background: linear-gradient(135deg, var(--color-primary), #ff6b8a, var(--color-secondary));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .slider-header p {
    color: var(--color-text-dim);
    font-size: 0.85rem;
    margin-top: 4px;
  }

  /* ========== SLIDER CONTAINER ========== */
  .slider-viewport {
    flex: 1;
    overflow: hidden;
    position: relative;
    display: flex;
    align-items: center;
    cursor: grab;
    user-select: none;
    -webkit-user-select: none;
  }
  .slider-viewport:active { cursor: grabbing; }

  .slider-track {
    display: flex;
    transition: transform 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    will-change: transform;
  }
  .slider-track.dragging {
    transition: none;
  }

  /* ========== SLIDES ========== */
  .slide {
    min-width: 100vw;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px 40px;
    position: relative;
  }
  .slide-inner {
    max-width: 960px;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 40px;
    opacity: 0.3;
    transform: scale(0.92) translateX(40px);
    transition: opacity 0.5s var(--ease-smooth), transform 0.5s var(--ease-smooth);
  }
  .slide.active .slide-inner {
    opacity: 1;
    transform: scale(1) translateX(0);
  }

  .slide-visual {
    flex-shrink: 0;
    width: 280px;
    height: 320px;
    border-radius: var(--radius);
    background-size: cover;
    background-position: center;
    position: relative;
    overflow: hidden;
  }
  .slide-visual::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, rgba(0,0,0,0.3), transparent);
    border-radius: inherit;
  }
  .slide-visual .slide-number {
    position: absolute;
    bottom: 16px;
    left: 16px;
    z-index: 2;
    font-size: 3rem;
    font-weight: 800;
    opacity: 0.3;
    color: #fff;
  }

  .slide-content {
    flex: 1;
  }
  .slide-content .slide-tag {
    display: inline-block;
    padding: 4px 14px;
    border-radius: 20px;
    background: rgba(233,69,96,0.15);
    color: var(--color-primary);
    font-size: 0.72rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 14px;
  }
  .slide-content h2 {
    font-size: clamp(1.4rem, 2.5vw, 2rem);
    font-weight: 800;
    line-height: 1.2;
    margin-bottom: 12px;
  }
  .slide-content p {
    font-size: 0.92rem;
    color: var(--color-text-dim);
    line-height: 1.7;
    margin-bottom: 20px;
  }
  .slide-content .cta-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 28px;
    border: none;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--color-primary), #d13350);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .slide-content .cta-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 24px rgba(233,69,96,0.4);
  }

  /* ========== NAV DOTS ========== */
  .nav-wrapper {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 20px;
  }
  .nav-dots {
    display: flex;
    gap: 10px;
  }
  .nav-dots .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: rgba(255,255,255,0.2);
    cursor: pointer;
    transition: all 0.3s var(--ease-smooth);
  }
  .nav-dots .dot.active {
    background: var(--color-primary);
    transform: scale(1.3);
    box-shadow: 0 0 12px rgba(233,69,96,0.5);
  }
  .nav-dots .dot:hover:not(.active) {
    background: rgba(255,255,255,0.4);
  }
  .nav-arrows {
    display: flex;
    gap: 10px;
  }
  .nav-arrows button {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.12);
    background: rgba(22,33,62,0.9);
    color: var(--color-text);
    font-size: 1rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
  }
  .nav-arrows button:hover {
    background: var(--color-primary);
    border-color: var(--color-primary);
    transform: scale(1.08);
  }

  /* ========== PROGRESS BAR ========== */
  .progress-bar {
    position: fixed;
    top: 0;
    left: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--color-primary), var(--color-secondary));
    transition: width 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
    z-index: 100;
  }

  /* ========== BACKGROUND DECORATION ========== */
  .bg-orb {
    position: fixed;
    border-radius: 50%;
    pointer-events: none;
    filter: blur(80px);
    opacity: 0.08;
    transition: transform 1s var(--ease-smooth);
  }
  .bg-orb-1 {
    width: 500px; height: 500px;
    background: var(--color-primary);
    top: -150px; right: -100px;
  }
  .bg-orb-2 {
    width: 400px; height: 400px;
    background: var(--color-secondary);
    bottom: -100px; left: -100px;
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 700px) {
    .slide {
      padding: 20px;
    }
    .slide-visual {
      width: 180px;
      height: 220px;
    }
    .slide-inner {
      flex-direction: column;
      text-align: center;
      gap: 20px;
    }
  }
</style>
</head>
<body>

<div class="progress-bar" id="progressBar"></div>
<div class="bg-orb bg-orb-1" id="orb1"></div>
<div class="bg-orb bg-orb-2" id="orb2"></div>

<!-- ==================== HEADER ==================== -->
<header class="slider-header">
  <h1>Lateral Slider</h1>
  <p>Swipe or drag to navigate · Momentum-based easing</p>
</header>

<!-- ==================== SLIDER ==================== -->
<div class="slider-viewport" id="viewport">
  <div class="slider-track" id="track">
    <!-- Slides built by JS -->
  </div>
</div>

<!-- ==================== NAVIGATION ==================== -->
<nav class="nav-wrapper">
  <div class="nav-arrows">
    <button id="prevBtn">◀</button>
  </div>
  <div class="nav-dots" id="dots"></div>
  <div class="nav-arrows">
    <button id="nextBtn">▶</button>
  </div>
</nav>

<!-- ==================== JS ==================== -->
<script>
(function() {
  'use strict';

  // === SLIDE DATA ===
  const slideData = [
    {
      tag: 'Innovation',
      title: 'Redefining Digital Experiences',
      desc: 'Push boundaries with fluid animations and seamless transitions that feel natural. Every pixel serves a purpose, every motion tells a story.',
      cta: 'Explore Now',
      gradient: 'linear-gradient(135deg, #0f3460, #533483)',
      number: '01'
    },
    {
      tag: 'Performance',
      title: 'Buttery Smooth at 60fps',
      desc: 'GPU-accelerated transforms ensure animations never drop a frame. Pure CSS transitions driven by hardware compositing for maximum performance.',
      cta: 'Learn More',
      gradient: 'linear-gradient(135deg, #e94560, #533483)',
      number: '02'
    },
    {
      tag: 'Design',
      title: 'Crafted with Intent',
      desc: 'Every easing curve, every shadow depth, every gradient angle has been meticulously tuned. Good design is invisible — you only notice when it\'s missing.',
      cta: 'View Work',
      gradient: 'linear-gradient(135deg, #16213e, #0f3460)',
      number: '03'
    },
    {
      tag: 'Interaction',
      title: 'Feel the Momentum',
      desc: 'Momentum-based drag with deceleration that respects physics. Swipe fast and watch the slider coast with natural easing to its destination.',
      cta: 'Try It',
      gradient: 'linear-gradient(135deg, #533483, #e94560)',
      number: '04'
    },
    {
      tag: 'Responsive',
      title: 'Adapts to Every Screen',
      desc: 'From ultrawide monitors to pocket-sized phones, content reflows gracefully. Typography scales, images resize, and nothing overflows.',
      cta: 'See Demo',
      gradient: 'linear-gradient(135deg, #0f3460, #e94560)',
      number: '05'
    }
  ];

  const TOTAL = slideData.length;
  const track = document.getElementById('track');
  const viewport = document.getElementById('viewport');
  const dotsContainer = document.getElementById('dots');
  const progressBar = document.getElementById('progressBar');
  const orb1 = document.getElementById('orb1');
  const orb2 = document.getElementById('orb2');

  let currentIndex = 0;
  let isDragging = false;
  let startX = 0;
  let currentTranslate = 0;
  let prevTranslate = 0;
  let dragVelocity = 0;
  let lastMoveTime = 0;
  let lastMoveX = 0;

  // === BUILD SLIDES ===
  slideData.forEach((s, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide' + (i === 0 ? ' active' : '');
    slide.innerHTML = `
      <div class="slide-inner">
        <div class="slide-visual" style="background: ${s.gradient};">
          <span class="slide-number">${s.number}</span>
        </div>
        <div class="slide-content">
          <span class="slide-tag">${s.tag}</span>
          <h2>${s.title}</h2>
          <p>${s.desc}</p>
          <button class="cta-btn">${s.cta} →</button>
        </div>
      </div>
    `;
    track.appendChild(slide);

    // Dot
    const dot = document.createElement('div');
    dot.className = 'dot' + (i === 0 ? ' active' : '');
    dot.addEventListener('click', () => goTo(i));
    dotsContainer.appendChild(dot);
  });

  const slides = track.querySelectorAll('.slide');
  const dots = dotsContainer.querySelectorAll('.dot');

  // === POSITIONING ===
  function setPosition(index, offset) {
    const x = -index * window.innerWidth + (offset || 0);
    track.style.transform = `translateX(${x}px)`;
    progressBar.style.width = ((index + 1) / TOTAL * 100) + '%';
  }

  function goTo(index) {
    if (index < 0) index = TOTAL - 1;
    if (index >= TOTAL) index = 0;
    currentIndex = index;
    track.classList.remove('dragging');
    setPosition(currentIndex);
    updateActiveStates();
  }

  function updateActiveStates() {
    slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
    dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
    // Move orbs
    const orbShift = currentIndex * 40;
    orb1.style.transform = `translate(${orbShift}px, 0)`;
    orb2.style.transform = `translate(${-orbShift}px, 0)`;
  }

  // === DRAG INTERACTION ===
  function onPointerDown(e) {
    isDragging = true;
    startX = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    prevTranslate = -currentIndex * window.innerWidth;
    currentTranslate = prevTranslate;
    dragVelocity = 0;
    lastMoveTime = Date.now();
    lastMoveX = startX;
    track.classList.add('dragging');
  }

  function onPointerMove(e) {
    if (!isDragging) return;
    const x = e.clientX || (e.touches && e.touches[0].clientX) || 0;
    const dx = x - startX;
    currentTranslate = prevTranslate + dx;

    // Track velocity
    const now = Date.now();
    const dt = now - lastMoveTime;
    if (dt > 0) {
      dragVelocity = (x - lastMoveX) / dt; // px per ms
    }
    lastMoveTime = now;
    lastMoveX = x;

    track.style.transform = `translateX(${currentTranslate}px)`;
  }

  function onPointerUp(e) {
    if (!isDragging) return;
    isDragging = false;
    track.classList.remove('dragging');

    // Calculate momentum
    const velocityThreshold = 0.3; // px/ms
    const movedPixels = currentTranslate - prevTranslate;
    const movedSlides = Math.round(movedPixels / window.innerWidth);

    if (Math.abs(dragVelocity) > velocityThreshold) {
      // Fast swipe — go with velocity direction
      if (dragVelocity > 0) {
        goTo(currentIndex - 1);
      } else {
        goTo(currentIndex + 1);
      }
    } else if (Math.abs(movedSlides) > 0) {
      // Moved more than half a slide
      goTo(currentIndex - movedSlides);
    } else {
      // Snap back
      goTo(currentIndex);
    }
  }

  viewport.addEventListener('mousedown', onPointerDown);
  viewport.addEventListener('touchstart', onPointerDown, { passive: true });
  window.addEventListener('mousemove', onPointerMove);
  window.addEventListener('touchmove', onPointerMove, { passive: true });
  window.addEventListener('mouseup', onPointerUp);
  window.addEventListener('touchend', onPointerUp);

  // Keyboard navigation
  document.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowLeft') goTo(currentIndex - 1);
    if (e.key === 'ArrowRight') goTo(currentIndex + 1);
  });

  // Button navigation
  document.getElementById('prevBtn').addEventListener('click', () => goTo(currentIndex - 1));
  document.getElementById('nextBtn').addEventListener('click', () => goTo(currentIndex + 1));

  // Auto-play
  let autoInterval = setInterval(() => goTo(currentIndex + 1), 6000);
  // Pause on hover
  viewport.addEventListener('mouseenter', () => clearInterval(autoInterval));
  viewport.addEventListener('mouseleave', () => {
    clearInterval(autoInterval);
    autoInterval = setInterval(() => goTo(currentIndex + 1), 6000);
  });

  // Handle resize
  window.addEventListener('resize', () => setPosition(currentIndex));

  // Init
  setPosition(0);
  updateActiveStates();

})();
</script>

</body>
</html>
