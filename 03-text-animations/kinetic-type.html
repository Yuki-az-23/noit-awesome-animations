<!DOCTYPE html>
<html lang="en">
<head>
<!--
  ============================================================
  KINETIC TYPE — Kinetic Typography Animation
  ============================================================
  Text that moves, morphs, and transforms with dramatic
  character-level stagger and phrase-level scale/fade cycling.
  Pure CSS + Vanilla JS. No dependencies.
  ============================================================
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinetic Type Animation</title>
<style>
  /* ── Reset & Custom Properties ── */
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --color-bg: #0f0f1a;
    --color-surface: #16213e;
    --color-primary: #e94560;
    --color-text: #eaeaea;
    --color-muted: #7a7a9e;
    --color-accent: #0f3460;
    --color-glow: rgba(233, 69, 96, 0.35);
  }

  body {
    background: var(--color-bg);
    color: var(--color-text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* ── Background Ambience ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 30%, rgba(233,69,96,0.08) 0%, transparent 70%),
      radial-gradient(ellipse 60% 80% at 80% 70%, rgba(15,52,96,0.15) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── Header ── */
  header {
    width: 100%;
    padding: 2rem 2rem 1rem;
    text-align: center;
    position: relative;
    z-index: 2;
  }

  header h1 {
    font-size: clamp(1.4rem, 3vw, 2rem);
    font-weight: 200;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--color-primary) 0%, #ff8a65 50%, var(--color-primary) 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: headerShimmer 4s ease-in-out infinite;
  }

  @keyframes headerShimmer {
    0%, 100% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
  }

  header p {
    color: var(--color-muted);
    font-size: 0.85rem;
    margin-top: 0.5rem;
    letter-spacing: 0.08em;
  }

  /* ── Main Stage ── */
  main {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    width: 100%;
    max-width: 1100px;
    padding: 1rem 2rem 3rem;
    position: relative;
    z-index: 2;
  }

  /* ── Kinetic Stage ── */
  .kinetic-stage {
    width: 100%;
    min-height: 50vh;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    overflow: hidden;
    border-radius: 1rem;
    background: linear-gradient(145deg, var(--color-surface) 0%, rgba(15,15,26,0.6) 100%);
    border: 1px solid rgba(233,69,96,0.12);
    box-shadow:
      0 0 60px rgba(233,69,96,0.06),
      inset 0 0 80px rgba(0,0,0,0.3);
  }

  /* ── Phrase Container ── */
  .phrase {
    position: absolute;
    display: flex;
    flex-wrap: wrap;
    align-items: center;
    justify-content: center;
    gap: 0.15em;
    padding: 1.5rem;
    opacity: 0;
    transform: scale(0.7);
    transition: opacity 0.6s cubic-bezier(0.22, 1, 0.36, 1),
                transform 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    pointer-events: none;
  }

  .phrase.active {
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .phrase.exiting {
    opacity: 0;
    transform: scale(1.15);
  }

  /* ── Characters ── */
  .char {
    display: inline-block;
    font-size: clamp(2.5rem, 7vw, 6rem);
    font-weight: 900;
    line-height: 1.1;
    opacity: 0;
    transform: translateY(60px) rotateX(-40deg) scale(0.5);
    transition: none;
    text-shadow: 0 0 20px var(--color-glow);
    will-change: transform, opacity;
  }

  .char.revealed {
    opacity: 1;
    transform: translateY(0) rotateX(0deg) scale(1);
    transition:
      opacity 0.5s cubic-bezier(0.22, 1, 0.36, 1),
      transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* ── Per-phrase color themes ── */
  .phrase[data-theme="fire"] .char {
    color: #ff6b6b;
    text-shadow: 0 0 30px rgba(255,107,107,0.5), 0 0 60px rgba(255,107,107,0.2);
  }
  .phrase[data-theme="ocean"] .char {
    color: #4ecdc4;
    text-shadow: 0 0 30px rgba(78,205,196,0.5), 0 0 60px rgba(78,205,196,0.2);
  }
  .phrase[data-theme="gold"] .char {
    color: #ffd93d;
    text-shadow: 0 0 30px rgba(255,217,61,0.5), 0 0 60px rgba(255,217,61,0.2);
  }
  .phrase[data-theme="violet"] .char {
    color: #c084fc;
    text-shadow: 0 0 30px rgba(192,132,252,0.5), 0 0 60px rgba(192,132,252,0.2);
  }
  .phrase[data-theme="mint"] .char {
    color: #6ee7b7;
    text-shadow: 0 0 30px rgba(110,231,183,0.5), 0 0 60px rgba(110,231,183,0.2);
  }

  /* Space between words */
  .word-space {
    width: 0.3em;
  }

  /* ── Morph Effect (chars that dissolve between phrases) ── */
  .phrase.morph-in .char {
    opacity: 0;
    transform: translateY(-30px) scale(1.3);
  }
  .phrase.morph-in .char.revealed {
    opacity: 1;
    transform: translateY(0) scale(1);
    transition:
      opacity 0.4s ease-out,
      transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ── Indicator Dots ── */
  .indicators {
    display: flex;
    gap: 0.75rem;
    margin-top: 2rem;
    padding-bottom: 1rem;
  }

  .indicator {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    background: var(--color-muted);
    opacity: 0.3;
    transition: all 0.4s ease;
    cursor: pointer;
    border: none;
    outline: none;
  }

  .indicator.active {
    opacity: 1;
    background: var(--color-primary);
    box-shadow: 0 0 12px var(--color-glow);
    transform: scale(1.3);
  }

  /* ── Controls ── */
  .controls {
    display: flex;
    gap: 1rem;
    margin-top: 1.5rem;
    flex-wrap: wrap;
    justify-content: center;
  }

  .btn {
    background: transparent;
    color: var(--color-muted);
    border: 1px solid rgba(233,69,96,0.25);
    padding: 0.5rem 1.5rem;
    border-radius: 2rem;
    font-size: 0.85rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.3s ease;
    font-family: inherit;
  }

  .btn:hover {
    color: var(--color-text);
    border-color: var(--color-primary);
    background: rgba(233,69,96,0.1);
  }

  .btn.active {
    color: var(--color-text);
    border-color: var(--color-primary);
    background: rgba(233,69,96,0.15);
  }

  /* ── Footer Info ── */
  .info-bar {
    width: 100%;
    max-width: 1100px;
    padding: 1rem 2rem 2rem;
    display: flex;
    justify-content: center;
    gap: 2rem;
    flex-wrap: wrap;
    z-index: 2;
  }

  .info-card {
    background: var(--color-surface);
    border: 1px solid rgba(233,69,96,0.1);
    border-radius: 0.75rem;
    padding: 1rem 1.5rem;
    text-align: center;
    min-width: 140px;
  }

  .info-card .label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--color-muted);
    margin-bottom: 0.3rem;
  }

  .info-card .value {
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--color-primary);
  }

  /* ── Responsive ── */
  @media (max-width: 600px) {
    .kinetic-stage { min-height: 40vh; }
    .char { font-size: clamp(2rem, 10vw, 3.5rem); }
    .phrase { padding: 1rem; }
  }
</style>
</head>
<body>
  <header>
    <h1>Kinetic Type</h1>
    <p>Character-level stagger &middot; Phrase cycling &middot; Scale/fade transitions</p>
  </header>

  <main>
    <div class="kinetic-stage" id="stage"></div>

    <div class="indicators" id="indicators"></div>

    <div class="controls">
      <button class="btn" id="btnPause" onclick="togglePause()">Pause</button>
      <button class="btn" id="btnMorph" onclick="toggleMorph()">Morph Mode</button>
      <button class="btn" onclick="restart()">Restart</button>
    </div>
  </main>

  <div class="info-bar">
    <div class="info-card">
      <div class="label">Phrase</div>
      <div class="value" id="infoPhrase">1 / 5</div>
    </div>
    <div class="info-card">
      <div class="label">Characters</div>
      <div class="value" id="infoChars">0</div>
    </div>
    <div class="info-card">
      <div class="label">Mode</div>
      <div class="value" id="infoMode">Stagger</div>
    </div>
  </div>

<script>
/*
  ============================================================
  Kinetic Type — Animation Engine
  ============================================================
*/

// ── Configuration ──
const PHRASES = [
  { text: "MOVE FAST", theme: "fire" },
  { text: "BREAK LIMITS", theme: "ocean" },
  { text: "STAY BOLD", theme: "gold" },
  { text: "DREAM BIG", theme: "violet" },
  { text: "RISE ABOVE", theme: "mint" }
];

const STAGGER_DELAY = 50;      // ms between each character reveal
const PHRASE_HOLD = 2400;      // ms to hold each phrase
const TRANSITION_DUR = 600;     // ms for phrase exit/enter

// ── State ──
let currentIndex = 0;
let paused = false;
let morphMode = false;
let timer = null;
let totalChars = 0;

const stage = document.getElementById('stage');
const indicators = document.getElementById('indicators');

// ── Build DOM ──
PHRASES.forEach((phrase, i) => {
  // Create phrase element
  const el = document.createElement('div');
  el.className = 'phrase';
  el.dataset.theme = phrase.theme;
  el.dataset.index = i;

  // Split into chars
  const words = phrase.text.split(' ');
  words.forEach((word, wi) => {
    word.split('').forEach(ch => {
      const span = document.createElement('span');
      span.className = 'char';
      span.textContent = ch;
      el.appendChild(span);
    });
    if (wi < words.length - 1) {
      const space = document.createElement('span');
      space.className = 'word-space';
      el.appendChild(space);
    }
  });

  stage.appendChild(el);

  // Create indicator dot
  const dot = document.createElement('button');
  dot.className = 'indicator';
  dot.onclick = () => goTo(i);
  indicators.appendChild(dot);
});

// ── Core Animation ──
function revealPhrase(index) {
  const phrases = stage.querySelectorAll('.phrase');
  const phrase = phrases[index];
  const chars = phrase.querySelectorAll('.char');

  totalChars = chars.length;
  document.getElementById('infoChars').textContent = totalChars;
  document.getElementById('infoPhrase').textContent = `${index + 1} / ${PHRASES.length}`;

  // Update indicators
  indicators.querySelectorAll('.indicator').forEach((d, i) => {
    d.classList.toggle('active', i === index);
  });

  // Apply morph class if morph mode
  if (morphMode) {
    phrase.classList.add('morph-in');
  } else {
    phrase.classList.remove('morph-in');
  }

  // Reveal characters with stagger
  chars.forEach((ch, ci) => {
    // Add slight random y variation in morph mode
    if (morphMode) {
      const rndY = (Math.random() - 0.5) * 40;
      const rndScale = 1 + Math.random() * 0.4;
      ch.style.transform = `translateY(${rndY}px) scale(${rndScale})`;
    }

    setTimeout(() => {
      ch.classList.add('revealed');
    }, ci * STAGGER_DELAY + 100);
  });
}

function showPhrase(index) {
  const phrases = stage.querySelectorAll('.phrase');

  // Deactivate all
  phrases.forEach(p => {
    if (p.classList.contains('active')) {
      p.classList.remove('active');
      p.classList.add('exiting');
      // Reset chars after transition
      setTimeout(() => {
        p.classList.remove('exiting');
        p.querySelectorAll('.char').forEach(c => {
          c.classList.remove('revealed');
          c.style.transform = '';
        });
      }, TRANSITION_DUR);
    }
  });

  // Activate new
  setTimeout(() => {
    phrases[index].classList.add('active');
    revealPhrase(index);
  }, 150);
}

function nextPhrase() {
  currentIndex = (currentIndex + 1) % PHRASES.length;
  showPhrase(currentIndex);
}

function scheduleNext() {
  clearTimeout(timer);
  timer = setTimeout(() => {
    if (!paused) nextPhrase();
    scheduleNext();
  }, PHRASE_HOLD + totalChars * STAGGER_DELAY);
}

function goTo(index) {
  currentIndex = index;
  showPhrase(currentIndex);
  // Reset timer
  clearTimeout(timer);
  scheduleNext();
}

function togglePause() {
  paused = !paused;
  const btn = document.getElementById('btnPause');
  btn.textContent = paused ? 'Play' : 'Pause';
  btn.classList.toggle('active', paused);
}

function toggleMorph() {
  morphMode = !morphMode;
  const btn = document.getElementById('btnMorph');
  btn.classList.toggle('active', morphMode);
  document.getElementById('infoMode').textContent = morphMode ? 'Morph' : 'Stagger';
}

function restart() {
  currentIndex = 0;
  showPhrase(0);
  clearTimeout(timer);
  scheduleNext();
}

// ── Initialize ──
showPhrase(0);
scheduleNext();
</script>
</body>
</html>
