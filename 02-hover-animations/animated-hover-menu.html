<!DOCTYPE html>
<html lang="en">
<head>
<!--
  Animated Hover Menu
  Inspired by "Hover states for menu items" & "Myriad - Menu hover animation"
  Full-screen overlay menu with creative hover effects per item:
  underline draw, background slide, text displacement, color fill, strikethrough morph.
  Pure CSS + Vanilla JS · No dependencies
-->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animated Hover Menu</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--surface:#16213e;--primary:#e94560;--accent:#ffc947;
  --accent2:#6c5ce7;--text:#eaeaea;--muted:#7a7a9a;
  --card:#1a1a2e;--border:rgba(233,69,96,.18);
}
body{
  font-family:'Segoe UI',system-ui,-apple-system,sans-serif;
  background:var(--bg);color:var(--text);overflow-x:hidden;
}

/* ── hero section ── */
.hero{
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  position:relative;z-index:1;text-align:center;padding:20px;
}
.hero h1{
  font-size:4rem;font-weight:900;
  background:linear-gradient(135deg,var(--primary),var(--accent));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:16px;
}
.hero p{font-size:1.1rem;color:var(--muted);max-width:400px;line-height:1.6}
.hero-hint{margin-top:40px;animation:hintPulse 2s ease infinite}
@keyframes hintPulse{0%,100%{opacity:.5;transform:translateY(0)}50%{opacity:1;transform:translateY(-6px)}}

/* ── hamburger ── */
.hamburger{
  position:fixed;top:28px;right:28px;z-index:1001;width:48px;height:48px;
  background:rgba(26,26,46,.8);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:transform .3s,background .3s;
}
.hamburger:hover{transform:scale(1.1);background:rgba(233,69,96,.15)}
.hamburger-line{
  display:block;width:22px;height:2px;background:var(--text);
  transition:all .35s cubic-bezier(.77,0,.18,1);
  position:absolute;
}
.hamburger-line:nth-child(1){transform:translateY(-7px)}
.hamburger-line:nth-child(2){transform:translateY(0)}
.hamburger-line:nth-child(3){transform:translateY(7px)}
.hamburger.open .hamburger-line:nth-child(1){transform:translateY(0) rotate(45deg)}
.hamburger.open .hamburger-line:nth-child(2){opacity:0;transform:scaleX(0)}
.hamburger.open .hamburger-line:nth-child(3){transform:translateY(0) rotate(-45deg)}

/* ── overlay ── */
.overlay{
  position:fixed;inset:0;z-index:1000;
  background:rgba(15,15,26,.96);
  backdrop-filter:blur(20px);
  opacity:0;visibility:hidden;
  transition:opacity .5s cubic-bezier(.16,1,.3,1),visibility .5s;
}
.overlay.open{opacity:1;visibility:visible}

/* ── overlay left decoration ── */
.overlay-deco{
  position:absolute;left:60px;top:50%;transform:translateY(-50%);
  font-size:8rem;font-weight:900;opacity:.04;
  line-height:1;writing-mode:vertical-rl;letter-spacing:-.02em;pointer-events:none;
  background:linear-gradient(180deg,var(--primary),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}

/* ── menu items ── */
.menu-container{
  position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
}
.menu-list{list-style:none;display:flex;flex-direction:column;gap:8px}
.menu-item{
  font-size:3.5rem;font-weight:900;text-transform:uppercase;
  position:relative;cursor:pointer;padding:8px 0;
  opacity:0;transform:translateX(-60px);
  transition:opacity .5s,transform .5s;
}
.overlay.open .menu-item{
  opacity:1;transform:translateX(0);
}
.overlay.open .menu-item:nth-child(1){transition-delay:.1s}
.overlay.open .menu-item:nth-child(2){transition-delay:.18s}
.overlay.open .menu-item:nth-child(3){transition-delay:.26s}
.overlay.open .menu-item:nth-child(4){transition-delay:.34s}
.overlay.open .menu-item:nth-child(5){transition-delay:.42s}

.menu-link{
  display:inline-block;position:relative;color:var(--muted);
  text-decoration:none;transition:color .3s;
}

/* ──────────────────────────────
   Effect 1: Underline Draw
   ────────────────────────────── */
.effect-underline .menu-link::after{
  content:'';position:absolute;bottom:4px;left:0;width:100%;height:3px;
  background:var(--primary);transform:scaleX(0);transform-origin:right;
  transition:transform .45s cubic-bezier(.23,1,.32,1);
  border-radius:2px;
}
.effect-underline .menu-link:hover::after{transform:scaleX(1);transform-origin:left}
.effect-underline .menu-link:hover{color:var(--text)}

/* ──────────────────────────────
   Effect 2: Background Slide
   ────────────────────────────── */
.effect-slide .menu-link::before{
  content:'';position:absolute;inset:-4px -12px;
  background:linear-gradient(135deg,rgba(233,69,96,.15),rgba(233,69,96,.05));
  border-radius:8px;transform:scaleX(0);transform-origin:left;
  transition:transform .45s cubic-bezier(.23,1,.32,1);
  z-index:-1;
}
.effect-slide .menu-link:hover::before{transform:scaleX(1)}
.effect-slide .menu-link:hover{color:var(--primary)}

/* ──────────────────────────────
   Effect 3: Text Displacement
   ────────────────────────────── */
.effect-displace .menu-link{
  overflow:hidden;display:inline-flex;flex-direction:column;
  height:1.1em;line-height:1.1;
}
.effect-displace .menu-link .text-top,
.effect-displace .menu-link .text-bottom{
  display:block;transition:transform .4s cubic-bezier(.23,1,.32,1);
}
.effect-displace .menu-link .text-bottom{
  color:var(--primary);position:absolute;top:100%;
}
.effect-displace .menu-link:hover .text-top{transform:translateY(-100%)}
.effect-displace .menu-link:hover .text-bottom{transform:translateY(-100%)}

/* ──────────────────────────────
   Effect 4: Color Fill (clip-path)
   ────────────────────────────── */
.effect-fill .menu-link::after{
  content:attr(data-text);position:absolute;left:0;top:0;
  color:var(--primary);clip-path:inset(0 100% 0 0);
  transition:clip-path .45s cubic-bezier(.23,1,.32,1);
}
.effect-fill .menu-link:hover::after{clip-path:inset(0 0 0 0)}
.effect-fill .menu-link:hover{color:var(--muted)}

/* ──────────────────────────────
   Effect 5: Strikethrough Morph
   ────────────────────────────── */
.effect-strike .menu-link{position:relative}
.effect-strike .menu-link::before{
  content:'';position:absolute;top:50%;left:0;width:100%;height:2px;
  background:var(--accent2);transform:scaleX(0) translateY(-50%);
  transition:transform .4s cubic-bezier(.23,1,.32,1),height .3s,background .3s;
  border-radius:2px;
}
.effect-strike .menu-link:hover::before{
  transform:scaleX(1) translateY(-50%);height:100%;
  background:rgba(108,92,231,.12);border-radius:8px;
}
.effect-strike .menu-link:hover{color:var(--accent2)}

/* ── menu number ── */
.menu-num{
  display:inline-block;font-size:1rem;font-weight:700;color:var(--primary);
  margin-right:16px;vertical-align:super;opacity:.5;
  transition:opacity .3s,transform .3s;
}
.menu-item:hover .menu-num{opacity:1;transform:translateX(-4px)}

/* ── effect labels ── */
.effect-tag{
  display:inline-block;font-size:.6rem;color:var(--accent);
  background:rgba(255,201,71,.1);padding:2px 8px;border-radius:4px;
  margin-left:12px;vertical-align:middle;font-weight:600;letter-spacing:1px;
  text-transform:uppercase;
}

/* ── bottom nav info ── */
.overlay-footer{
  position:absolute;bottom:40px;left:40px;right:40px;
  display:flex;justify-content:space-between;align-items:center;
  opacity:0;transition:opacity .5s .5s;
}
.overlay.open .overlay-footer{opacity:1}
.overlay-footer span{font-size:.8rem;color:var(--muted);letter-spacing:1px}
.overlay-social{display:flex;gap:12px}
.overlay-social a{
  width:36px;height:36px;border-radius:50%;border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  color:var(--muted);text-decoration:none;font-size:.8rem;font-weight:700;
  transition:all .3s;
}
.overlay-social a:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px)}

/* ── responsive ── */
@media(max-width:768px){
  .menu-item{font-size:2rem}
  .overlay-deco{display:none}
}
@media(max-width:500px){
  .menu-item{font-size:1.5rem}
  .hero h1{font-size:2.4rem}
}
</style>
</head>
<body>

<!-- Hero -->
<section class="hero">
  <h1>Menu Hover FX</h1>
  <p>Open the menu to explore five creative hover effects for navigation items.</p>
  <div class="hero-hint">↑ Tap the menu button</div>
</section>

<!-- Hamburger -->
<div class="hamburger" id="hamburger" role="button" aria-label="Toggle menu" tabindex="0">
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
  <span class="hamburger-line"></span>
</div>

<!-- Overlay -->
<div class="overlay" id="overlay">
  <div class="overlay-deco">MENU</div>

  <nav class="menu-container">
    <ul class="menu-list">
      <li class="menu-item effect-underline">
        <span class="menu-num">01</span>
        <a class="menu-link" href="#" data-text="Underline">Underline</a>
        <span class="effect-tag">draw</span>
      </li>
      <li class="menu-item effect-slide">
        <span class="menu-num">02</span>
        <a class="menu-link" href="#" data-text="Background">Background</a>
        <span class="effect-tag">slide</span>
      </li>
      <li class="menu-item effect-displace">
        <span class="menu-num">03</span>
        <a class="menu-link" href="#" data-text="Displace">
          <span class="text-top">Displace</span>
          <span class="text-bottom">Displace</span>
        </a>
        <span class="effect-tag">shift</span>
      </li>
      <li class="menu-item effect-fill">
        <span class="menu-num">04</span>
        <a class="menu-link" href="#" data-text="Color Fill">Color Fill</a>
        <span class="effect-tag">reveal</span>
      </li>
      <li class="menu-item effect-strike">
        <span class="menu-num">05</span>
        <a class="menu-link" href="#" data-text="Strikethrough">Strikethrough</a>
        <span class="effect-tag">morph</span>
      </li>
    </ul>
  </nav>

  <div class="overlay-footer">
    <span>Hover each item to see the effect</span>
    <div class="overlay-social">
      <a href="#">Tw</a>
      <a href="#">Ig</a>
      <a href="#">Li</a>
    </div>
  </div>
</div>

<script>
const hamburger = document.getElementById('hamburger');
const overlay = document.getElementById('overlay');
let isOpen = false;

function toggleMenu() {
  isOpen = !isOpen;
  hamburger.classList.toggle('open', isOpen);
  overlay.classList.toggle('open', isOpen);
  document.body.style.overflow = isOpen ? 'hidden' : '';
}

hamburger.addEventListener('click', toggleMenu);
hamburger.addEventListener('keydown', e => {
  if(e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggleMenu(); }
});

/* Close on link click */
overlay.querySelectorAll('.menu-link').forEach(link => {
  link.addEventListener('click', e => {
    e.preventDefault();
    setTimeout(toggleMenu, 200);
  });
});

/* Subtle parallax on overlay deco */
overlay.addEventListener('mousemove', e => {
  const deco = overlay.querySelector('.overlay-deco');
  const x = (e.clientX / window.innerWidth - 0.5) * 20;
  const y = (e.clientY / window.innerHeight - 0.5) * 20;
  deco.style.transform = `translateY(-50%) translate(${x}px, ${y}px)`;
});
</script>
</body>
</html>
